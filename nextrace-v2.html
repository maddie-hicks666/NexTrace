<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexTrace — SIL House Support Register</title>
<style>
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
[data-action]:focus-visible, .modal-box:focus-visible {
  outline: 3px solid #1D5F8A;
  outline-offset: 2px;
}
:root {
  --bg: #F3F6F7;
  --surface: #FFFFFF;
  --surface-alt: #EAF0F2;
  --border: #DCE4E7;
  --text: #16232B;
  --text-muted: #5C6E76;
  --primary: #0F6E63;
  --primary-dark: #0A4F47;
  --primary-tint: #E3F1EE;
  --red: #B4362A;
  --red-bg: #FBEAE8;
  --yellow: #92620B;
  --yellow-bg: #FDF3DE;
  --orange: #B0530E;
  --orange-bg: #FCE9DA;
  --green: #1E7F4C;
  --green-bg: #E6F6ED;
  --blue: #1D5F8A;
  --blue-bg: #E5F1F8;
  --purple: #5B4B93;
  --purple-bg: #EEEAF7;
  --gray: #4B5A61;
  --gray-bg: #EAEEF0;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 2px rgba(16,35,40,.06), 0 4px 14px rgba(16,35,40,.06);
  --shadow-lg: 0 12px 40px rgba(10,25,30,.18);
  font-synthesis: none;
}

* { box-sizing: border-box; }

#app {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}

button, input, select, textarea { font-family: inherit; font-size: 14px; }

svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ---------- layout scaffolding ---------- */

.center-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(circle at 15% 10%, var(--primary-tint), transparent 45%),
    var(--bg);
}

.loading-card { text-align: center; color: var(--text-muted); }
.spinner {
  width: 34px; height: 34px; margin: 0 auto 14px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.app-shell { min-height: 100vh; display: flex; flex-direction: column; }

.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  flex-wrap: wrap;
}
.topbar-brand {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 16px; color: var(--primary-dark);
  letter-spacing: -0.01em;
}
.topbar-brand svg { color: var(--primary); }
.topbar-house { flex: 1; }
.topbar-user { display: flex; align-items: center; gap: 10px; margin-left: auto; color: var(--text-muted); font-size: 13.5px; }

.tabbar {
  display: flex; gap: 4px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tab-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  border: none; background: transparent; border-radius: var(--radius-sm);
  color: var(--text-muted); font-weight: 600; font-size: 13.5px;
  cursor: pointer; white-space: nowrap;
  transition: background .15s, color .15s;
}
.tab-btn:hover { background: var(--surface-alt); }
.tab-btn.tab-active { background: var(--primary-tint); color: var(--primary-dark); }
.tab-btn svg { width: 16px; height: 16px; }

.page { padding: 24px 20px 60px; max-width: 1080px; width: 100%; margin: 0 auto; flex: 1; }
.page-title { font-size: 22px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
.page-sub { color: var(--text-muted); margin: 0 0 20px; font-size: 14px; }
.section-divider { border-top: 1px solid var(--border); margin: 32px 0 20px; }
.section-title { font-size: 16px; font-weight: 700; margin: 0 0 14px; }
.page-head-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.page-head-row .page-title { margin: 0; }

/* ---------- buttons & forms ---------- */

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  padding: 9px 16px;
  font-weight: 600; font-size: 13.5px;
  cursor: pointer;
  transition: transform .05s ease, background .15s, border-color .15s, opacity .15s;
}
.btn:active { transform: translateY(1px); }
.btn-block { width: 100%; }
.btn-sm { padding: 6px 11px; font-size: 12.5px; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--surface-alt); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { background: #E1E9EC; }
.btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-alt); }
.btn-danger { background: var(--red-bg); color: var(--red); border-color: #EBC9C4; }
.btn-danger:hover { background: #F6DAD6; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: 6px; }
.icon-btn:hover { background: var(--surface-alt); }

.field { display: flex; flex-direction: column; gap: 5px; font-size: 13px; color: var(--text-muted); font-weight: 600; }
.field input, .field select, .field textarea {
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 9px 11px; color: var(--text); background: var(--surface);
  font-weight: 400; resize: vertical;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: 2px solid var(--primary); outline-offset: 1px; border-color: var(--primary);
}
.stack { display: flex; flex-direction: column; gap: 14px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
.form-error { background: var(--red-bg); color: var(--red); padding: 9px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; margin-top: 4px; }

/* ---------- login ---------- */

.login-card {
  background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-lg);
  padding: 32px; width: 100%; max-width: 380px;
}
.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
.brand-mark { width: 40px; height: 40px; border-radius: 10px; background: var(--primary-tint); color: var(--primary); display: flex; align-items: center; justify-content: center; }
.brand-name { font-weight: 800; font-size: 18px; color: var(--primary-dark); letter-spacing: -0.01em; }
.brand-sub { font-size: 12px; color: var(--text-muted); }
.demo-box { margin-top: 20px; background: var(--surface-alt); border-radius: var(--radius-sm); padding: 12px 14px; }
.demo-title { font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; }
.demo-row { display: flex; justify-content: space-between; gap: 10px; font-size: 12.5px; padding: 3px 0; color: var(--text-muted); }
.demo-row code { background: #fff; border: 1px solid var(--border); padding: 1px 6px; border-radius: 5px; color: var(--text); font-size: 12px; }
.fine-print { font-size: 11.5px; color: var(--text-muted); margin: 14px 0 0; line-height: 1.5; }

/* ---------- house select ---------- */

.house-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
.house-card {
  background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--primary); border-radius: var(--radius);
  padding: 16px; cursor: pointer; box-shadow: var(--shadow); transition: transform .1s, box-shadow .1s;
}
.house-card:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(10,25,30,.12); }
.house-locked { cursor: not-allowed; opacity: .55; }
.house-locked:hover { transform: none; box-shadow: var(--shadow); }
.house-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.house-icon { color: var(--primary); background: var(--primary-tint); width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.house-icon svg { width: 16px; height: 16px; }
.house-title { font-weight: 700; font-size: 15px; }
.house-sub-label { font-size: 11.5px; color: var(--text-muted); margin: -8px 0 10px; }
.lock-icon { margin-left: auto; color: var(--text-muted); }
.house-card-top .icon-btn { margin-left: auto; }
.house-counts { display: flex; gap: 6px; flex-wrap: wrap; }
.house-locked-text { font-size: 12px; color: var(--text-muted); }
.mini-pill { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
.mini-red { background: var(--red-bg); color: var(--red); }
.mini-yellow { background: var(--yellow-bg); color: var(--yellow); }
.mini-green { background: var(--green-bg); color: var(--green); }

/* ---------- dashboard ---------- */

.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 22px; }
.summary-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; cursor: pointer; box-shadow: var(--shadow); transition: transform .1s;
  border-left: 4px solid var(--border);
}
.summary-card:hover { transform: translateY(-2px); }
.summary-card.summary-static { cursor: default; }
.summary-card.summary-static:hover { transform: none; }
.sc-red { border-left-color: var(--red); }
.sc-yellow { border-left-color: var(--yellow); }
.sc-orange { border-left-color: var(--orange); }
.sc-green { border-left-color: var(--green); }
.sc-ceased { border-left-color: var(--gray); }
.summary-num { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.summary-label { display: flex; align-items: center; gap: 7px; color: var(--text-muted); font-size: 13px; font-weight: 600; margin-top: 4px; }

.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; align-items: start; }
@media (max-width: 780px) { .two-col { grid-template-columns: 1fr; } }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.panel-head { padding: 14px 16px; font-weight: 700; font-size: 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.badge-count { background: var(--surface-alt); color: var(--text-muted); font-size: 11px; padding: 1px 8px; border-radius: 20px; font-weight: 700; }
.alert-list { max-height: 420px; overflow-y: auto; }
.alert-row { display: flex; align-items: flex-start; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; }
.alert-row:last-child { border-bottom: none; }
.alert-row:hover { background: var(--surface-alt); }
.alert-icon { flex-shrink: 0; margin-top: 1px; }
.alert-text-wrap { line-height: 1.6; }
.alert-text-wrap .audit-badge { margin-right: 6px; }
.alert-critical .alert-icon { color: var(--red); }
.alert-warning .alert-icon { color: var(--yellow); }
.alert-static { cursor: default; }
.alert-static:hover { background: none; }

/* ---------- stock check ---------- */

.stockcheck-list { display: flex; flex-direction: column; gap: 8px; max-height: 360px; overflow-y: auto; padding-right: 4px; }
.stockcheck-row {
  display: grid; grid-template-columns: 1.3fr 0.9fr 1fr 0.7fr; gap: 14px; align-items: center;
  background: var(--surface-alt); border-radius: var(--radius-sm); padding: 10px 12px;
}
.stockcheck-current { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.nochange-check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); white-space: nowrap; font-weight: 600; }
.nochange-check input { width: 15px; height: 15px; }
.export-field-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px 14px; }
@media (max-width: 560px) { .stockcheck-row { grid-template-columns: 1fr; } }
.quick-actions { display: flex; flex-direction: column; gap: 10px; padding: 16px; }
.quick-action-group-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); font-weight: 700; margin: 6px 0 -2px; }
.quick-action-group-label:first-child { margin-top: 0; }
.empty-inline { padding: 24px 16px; color: var(--text-muted); font-size: 13px; text-align: center; }

/* ---------- status pills & dots ---------- */

.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.dot-red { background: var(--red); }
.dot-yellow { background: var(--yellow); }
.dot-orange { background: var(--orange); }
.dot-green { background: var(--green); }
.dot-ceased { background: var(--gray); }
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.pill-red { background: var(--red-bg); color: var(--red); }
.pill-yellow { background: var(--yellow-bg); color: var(--yellow); }
.pill-orange { background: var(--orange-bg); color: var(--orange); }
.pill-green { background: var(--green-bg); color: var(--green); }
.pill-ceased { background: var(--gray-bg); color: var(--gray); }
.pill-gray { background: var(--gray-bg); color: var(--gray); }
.pill-blue { background: var(--blue-bg); color: var(--blue); }

/* ---------- filter row / search ---------- */

.filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 220px; display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text-muted); }
.search-box input { border: none; outline: none; flex: 1; background: transparent; color: var(--text); font-size: 13.5px; }
.select-filter { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; background: var(--surface); color: var(--text); font-size: 13.5px; }

/* ---------- medication list ---------- */

.med-list { display: flex; flex-direction: column; gap: 8px; }
.med-row {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
  gap: 12px; cursor: pointer; box-shadow: var(--shadow); flex-wrap: wrap;
}
.med-row:hover { border-color: var(--primary); }
.med-row-main { display: flex; align-items: center; gap: 12px; }
.med-name { font-weight: 700; font-size: 14.5px; }
.med-sub { color: var(--text-muted); font-size: 12.5px; margin-top: 2px; }
.med-row-stats { display: flex; gap: 22px; }
.stat { display: flex; flex-direction: column; align-items: flex-end; min-width: 62px; }
.stat-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); font-weight: 700; }
.stat-val { font-weight: 700; font-size: 13.5px; font-variant-numeric: tabular-nums; }

.empty-block { text-align: center; padding: 40px 20px; color: var(--text-muted); background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); }
.empty-block p { margin: 0 0 12px; }

/* ---------- row lists (deliveries / repeats) ---------- */

.list-head { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; padding: 0 16px; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; }
.row-list { display: flex; flex-direction: column; gap: 8px; }
.row-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px 16px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; align-items: center;
  box-shadow: var(--shadow);
}
@media (max-width: 700px) { .row-card, .list-head { grid-template-columns: 1fr; } .list-head { display: none; } }
.row-title { font-weight: 700; font-size: 13.5px; }
.row-sub { color: var(--text-muted); font-size: 12px; margin-top: 1px; }
.row-mid { font-size: 13px; color: var(--text); }
.row-card.client-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }

/* ---------- audit ---------- */

.audit-list { display: flex; flex-direction: column; gap: 6px; }
.audit-row {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 14px; display: grid; grid-template-columns: 150px 130px 1fr; gap: 12px; align-items: center;
  font-size: 13px;
}
@media (max-width: 700px) { .audit-row { grid-template-columns: 1fr; } }
.audit-time { color: var(--text-muted); font-size: 12px; font-variant-numeric: tabular-nums; }
.audit-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; width: fit-content; }
.house-tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-right: 6px; cursor: help; }
.badge-teal { background: var(--primary-tint); color: var(--primary-dark); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-gray { background: var(--gray-bg); color: var(--gray); }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
.badge-orange { background: var(--orange-bg); color: var(--orange); }
.badge-green { background: var(--green-bg); color: var(--green); }
.audit-detail { color: var(--text); }

/* ---------- modal ---------- */

.modal-overlay {
  position: fixed; inset: 0; background: rgba(10, 20, 24, .45);
  display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100;
}
.modal-box {
  background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-lg);
  width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
.modal-head h2 { margin: 0; font-size: 17px; }
.modal-body { padding: 20px; }

.detail-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.issue-tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin: -8px 0 16px; }
.detail-days { color: var(--text-muted); font-size: 13px; font-weight: 600; }
.detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 14px; }
.detail-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); font-weight: 700; }
.detail-section { margin-bottom: 14px; }
.detail-section p { margin: 4px 0 0; font-size: 13.5px; }
.mini-row { font-size: 12.5px; color: var(--text-muted); padding: 4px 0; border-bottom: 1px solid var(--border); }
.mini-row:last-child { border-bottom: none; }
.muted { color: var(--text-muted); font-size: 13px; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #C7D1D5; border-radius: 10px; }
::-webkit-scrollbar-track { background: transparent; }

/* ---------- COS preview dashboard ---------- */

.cos-banner {
  background: var(--yellow-bg); color: var(--yellow); border: 1px solid #F0DBA8;
  border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; font-weight: 600;
  margin-bottom: 20px; max-width: 1080px; width: 100%; margin-left: auto; margin-right: auto;
}
.save-error-banner {
  background: var(--red-bg); color: var(--red); border-bottom: 1px solid #EBC9C4;
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.save-error-banner svg { width: 16px; height: 16px; flex-shrink: 0; }
.wellbeing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.wellbeing-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; box-shadow: var(--shadow);
}
.wellbeing-card .row-title { margin-bottom: 4px; }
.wellbeing-card .wellbeing-note { font-size: 12.5px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }

/* ---------- ops overview ---------- */

.priority-banner {
  display: flex; align-items: center; gap: 10px; padding: 12px 20px; font-size: 14px; font-weight: 700;
}
.priority-banner svg { width: 18px; height: 18px; flex-shrink: 0; }
.priority-critical { background: var(--red-bg); color: var(--red); }
.priority-ok { background: var(--green-bg); color: var(--green); }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
.kpi-grid .summary-card { cursor: default; }
.kpi-grid .summary-card:hover { transform: none; }

.ops-action-list { max-height: 640px; overflow-y: auto; }
.ops-action-row {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; flex-wrap: wrap;
}
.ops-action-row:last-child { border-bottom: none; }
.ops-action-critical { border-left: 3px solid var(--red); }
.ops-action-warning { border-left: 3px solid var(--yellow); }
.ops-action-main { flex: 1; min-width: 220px; }
.ops-action-text { font-size: 13.5px; margin-top: 6px; line-height: 1.5; }

</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  "use strict";

  var UNITS = ["mL", "tablets", "mg", "grams", "sachets", "tubes"];
  var MED_TYPES = ["Routine", "PRN", "Short-term"];
  var ROUTES = ["Oral", "Buccal", "Sublingual", "Topical", "Inhaled", "Injection (subcutaneous)", "Injection (intramuscular)", "Rectal", "Eye drops", "Ear drops", "Nasal", "Transdermal (patch)"];
  var CONSUMABLE_CATEGORIES = ["Pads", "Inserts", "Wipes", "Barrier Cream", "Formula", "PEG Feeding Supplies", "Gloves", "Other"];
  var CONSUMABLE_UNITS = ["pack", "box", "carton", "tube", "bottle", "pair", "each", "roll"];
  var CONSUMABLE_CATEGORY_LEAD_WEEKS = { "Pads": 2, "Inserts": 2, "Wipes": 1, "Barrier Cream": 2, "Formula": 3, "PEG Feeding Supplies": 3, "Gloves": 1, "Other": 2 };
  var DISCREPANCY_REASONS = ["Expired", "Ceased", "Damaged or disposed", "Administration error", "Unknown", "Other"];
  var TOTAL_HOUSES = 16;
  var DEFAULT_HOUSE_NAMES = { 1: "Wattle House", 2: "Banksia House", 3: "Grevillea House", 4: "Correa House", 5: "Hakea House", 6: "Boronia House", 7: "Acacia House", 8: "Waratah House", 9: "Bottlebrush House", 10: "Wandoo House", 11: "Melaleuca House", 12: "Kurrajong House", 13: "Tea Tree House", 14: "Eucalypt House", 15: "Flannel Flower House", 16: "Sturt House" };
  var HOUSE_COLORS = {
    1: { base: "#0F6E63", tint: "#E3F1EE" },
    2: { base: "#1D5F8A", tint: "#E5F1F8" },
    3: { base: "#5B4B93", tint: "#EEEAF7" },
    4: { base: "#B05A16", tint: "#FBEEE0" },
    5: { base: "#A23E6B", tint: "#F8E7EF" },
    6: { base: "#3F6B52", tint: "#E7F1EC" },
    7: { base: "#7A5230", tint: "#F1E8DE" },
    8: { base: "#405166", tint: "#E8ECF1" },
    9: { base: "#8A6D1D", tint: "#F5EFDD" },
    10: { base: "#2E6B7E", tint: "#E4F0F3" },
    11: { base: "#6B3F5B", tint: "#F1E6EC" },
    12: { base: "#4A6B2E", tint: "#EBF1E4" },
    13: { base: "#7E4A2E", tint: "#F3E9E1" },
    14: { base: "#2E4A7E", tint: "#E4E9F3" },
    15: { base: "#7E2E4A", tint: "#F3E4E9" },
    16: { base: "#4A7E6B", tint: "#E4F3EE" }
  };
  var MED_EXPORT_FIELDS = [
    { key: "name", label: "Medication name", def: true },
    { key: "client", label: "Client", def: true },
    { key: "type", label: "Type", def: true },
    { key: "route", label: "Route", def: false },
    { key: "status", label: "Status", def: true },
    { key: "stock", label: "Current stock", def: true },
    { key: "daysLeft", label: "Days left", def: true },
    { key: "expiryDate", label: "Expiry date", def: true },
    { key: "ceaseDate", label: "Cease date", def: false },
    { key: "reorderLeadDays", label: "Reorder lead time (days)", def: false },
    { key: "unitsPerDose", label: "Units per dose", def: false },
    { key: "recurring", label: "Recurring delivery schedule", def: false },
    { key: "dosageInstructions", label: "Dosage instructions", def: false },
    { key: "prnInstructions", label: "PRN instructions", def: false },
    { key: "notes", label: "Notes", def: false }
  ];
  var EQUIPMENT_STATUSES = ["In use", "Under repair", "Awaiting parts", "Awaiting NDIS approval", "Decommissioned"];
  var ACTION_COLORS = {
    "Medication added": "teal",
    "Medication updated": "teal",
    "Medication deleted": "red",
    "Delivery received": "blue",
    "Repeat added": "purple",
    "Repeat updated": "purple",
    "Repeat deleted": "red",
    "Incident flagged": "red",
    "Stock check completed": "blue",
    "Stock check adjustment": "blue",
    "Client added": "teal",
    "House renamed": "teal",
    "Alert assigned": "blue",
    "Alert resolved": "teal",
    "Client removed": "red",
    "Consumable added": "teal",
    "Consumable updated": "teal",
    "Consumable deleted": "red",
    "Consumable delivery received": "blue",
    "Consumable stocktake recorded": "blue",
    "Consumable usage flagged": "red",
    "Equipment added": "teal",
    "Equipment status updated": "purple",
    "Equipment deleted": "red",
    "Discrepancy detected": "red",
    "Discrepancy resolved": "teal",
    "Medication disposed": "red",
    "Sample data loaded": "gray"
  };
  var ACTION_TAG_COLORS = {
    "Order stock": "blue",
    "Plan reorder": "blue",
    "Reorder soon": "blue",
    "Dispose & reorder": "red",
    "GP appointment": "purple",
    "Review incident": "red",
    "Review usage": "purple",
    "Follow up repair": "purple",
    "Arrange servicing": "blue",
    "Arrange safety inspection": "red",
    "Review discrepancy": "purple",
    "Urgent: resolve discrepancy": "red",
    "Confirm delivery": "blue"
  };

  var state = {
    user: null,
    houseId: null,
    tab: "dashboard",
    modal: null,
    medFilter: "all",
    medSearch: "",
    deliverySearch: "",
    auditSearch: "",
    auditTypeFilter: "all",
    consumableSearch: "",
    consumableFilter: "all",
    consumableDeliverySearch: "",
    equipmentSearch: "",
    equipmentFilter: "all",
    cosClientKey: "",
    allHousesSort: "severity",
    globalSearch: "",
    viewingAllHouses: false,
    saveError: false,
    storageDisabled: false,
    viewingOpsOverview: false,
    sinceLastLogin: null,
    opsActionNoteAlert: null,
    loginError: "",
    modalError: "",
    loaded: false,
    authChecked: false,
    loggingIn: false,
    pendingDelete: null,
    pendingRepeatAttachment: null,
    data: {}
  };

  function uid(prefix) {
    return prefix + "_" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
  }

  function esc(str) {
    if (str === null || str === undefined) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function todayISO() {
    var d = new Date();
    return d.toISOString().slice(0, 10);
  }

  function today() {
    var d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  }

  function daysBetween(dateStr) {
    if (!dateStr) return null;
    var parts = dateStr.split("-");
    var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    var t = today();
    return Math.round((d - t) / 86400000);
  }

  function fmtDate(dateStr) {
    if (!dateStr) return "—";
    var parts = dateStr.split("-");
    var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    return d.toLocaleDateString(undefined, { day: "2-digit", month: "short", year: "numeric" });
  }

  function fmtDateTime(iso) {
    var d = new Date(iso);
    return d.toLocaleDateString(undefined, { day: "2-digit", month: "short", year: "numeric" }) +
      " " + d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
  }

  function houseData() {
    return state.data[state.houseId];
  }

  function houseLabel(id) {
    var hd = state.data[id];
    return (hd && hd.houseName) || ("House " + id);
  }

  function saveErrorBanner() {
    if (!state.saveError) return "";
    var detail = lastStorageError ? ' <span style="opacity:.75">(' + lastStorageError.replace(/</g, "&lt;") + ")</span>" : "";
    if (state.storageDisabled) {
      return '<div class="save-error-banner">' + icon("alert") + " Can't reach the server, so nothing is being saved right now — everything still works locally, but changes need a connection to sync. Check your internet connection, or reload to try again." + detail + "</div>";
    }
    return '<div class="save-error-banner">' + icon("alert") + " Changes aren't saving right now — this looks like a connection issue, not a data problem. Your work is still here in this session; try reloading if it doesn't clear up." + detail + "</div>";
  }

  function isSupportWorker() {
    return !!(state.user && state.user.role === "Support Worker");
  }

  function isCOS() {
    return !!(state.user && state.user.role === "Coordinator of Supports");
  }

  function isClinical() {
    return !!(state.user && state.user.role === "Clinical");
  }

  function isAdmin() {
    return !!(state.user && state.user.role === "Admin");
  }

  function allowedTabs() {
    if (isSupportWorker()) return ["dashboard"];
    if (isClinical()) return ["dashboard", "medications", "clients", "audit"];
    return ["dashboard", "medications", "clients", "audit", "consumables", "equipment"];
  }

  function currentMedStock(med) {
    var baseline = Number(med.stock) || 0;
    var usage = Number(med.avgUsagePerDay) || 0;
    if (usage <= 0) return baseline;
    var asOfDate = med.stockAsOfDate || (med.createdAt ? med.createdAt.slice(0, 10) : todayISO());
    var today = todayISO();
    var endDate = today;
    if (med.ceaseDate && med.ceaseDate < today) endDate = med.ceaseDate;
    var daysSince = Math.max(0, Math.round((new Date(endDate) - new Date(asOfDate)) / 86400000));
    return Math.max(0, Math.round((baseline - usage * daysSince) * 10) / 10);
  }

  function medDaysLeft(med) {
    var usage = Number(med.avgUsagePerDay) || 0;
    if (usage <= 0) return null;
    return Math.floor(currentMedStock(med) / usage);
  }

  function medStatus(med) {
    if (med.ceaseDate && daysBetween(med.ceaseDate) <= 0) return "ceased";
    var stock = currentMedStock(med);
    if (stock <= 0) return "red";
    if (med.expiryDate && daysBetween(med.expiryDate) < 0) return "red";
    var dl = medDaysLeft(med);
    var lead = Number(med.reorderLeadDays) > 0 ? Number(med.reorderLeadDays) : 7;
    if (dl === null) {
      if (stock <= 5) return "red";
      if (stock <= 15) return "yellow";
      return "green";
    }
    if (dl < lead) return "red";
    if (dl < lead * 2) return "yellow";
    return "green";
  }

  function recurringDueDays(med) {
    if (!med.recurringEnabled || !med.recurringNextDue) return null;
    return daysBetween(med.recurringNextDue);
  }

  function recurringIsDue(med) {
    var d = recurringDueDays(med);
    return d !== null && d <= 0;
  }

  function medIssueTags(med) {
    var h = houseData();
    var tags = [];
    var isExpired = med.expiryDate && daysBetween(med.expiryDate) < 0;
    var isCeased = med.ceaseDate && daysBetween(med.ceaseDate) <= 0;
    var curStock = currentMedStock(med);

    if (isCeased) tags.push({ label: "Ceased", color: "gray" });
    if (curStock <= 0) tags.push({ label: "Out of stock", color: "red" });
    if (isExpired && curStock > 0) tags.push({ label: "Expired", color: "red" });
    if (!isExpired && med.expiryDate) {
      var db = daysBetween(med.expiryDate);
      if (db >= 0 && db <= 30) tags.push({ label: "Expires soon", color: "yellow" });
    }
    if (!isCeased && curStock > 0 && !isExpired) {
      var st = medStatus(med);
      if (st === "red") tags.push({ label: "Critically low stock", color: "red" });
      else if (st === "yellow") tags.push({ label: "Low stock", color: "yellow" });
    }
    h.repeats.filter(function (r) { return r.medId === med.id; }).forEach(function (r) {
      var rs = repeatStatus(r);
      if (rs === "Expired") tags.push({ label: "Repeat expired", color: "red" });
      else if (rs === "Due soon") tags.push({ label: "Repeat due soon", color: "yellow" });
      else if (Number(r.repeatsRemaining) <= 1) tags.push({ label: "Repeats running out", color: "yellow" });
    });
    var openDiscs = h.discrepancies.filter(function (d) { return d.medId === med.id && d.status === "open"; });
    if (openDiscs.length) {
      tags.push({ label: openDiscs.some(function (d) { return d.tier === "large"; }) ? "Urgent discrepancy" : "Discrepancy flagged", color: "red" });
    }
    if (recurringIsDue(med)) tags.push({ label: "Delivery due", color: "blue" });
    return tags;
  }

  /* ---------- Webster Pack helpers ----------
     A Webster Pack is a container (e.g. "Webster Pack A") that groups
     medications supplied together by the pharmacy. Each medication keeps
     its own script, expiry, repeats, dosage and forecasting — the pack
     just links to them and rolls up their alerts for a quick summary. */
  function packMeds(h, packId) {
    return h.meds.filter(function (m) { return m.websterPackId === packId; });
  }

  function packIssueTags(h, packId) {
    var all = [];
    packMeds(h, packId).forEach(function (m) {
      medIssueTags(m).forEach(function (t) {
        all.push({ label: m.name + ": " + t.label, color: t.color, medId: m.id });
      });
    });
    return all;
  }

  function packWorstColor(h, packId) {
    var tags = packIssueTags(h, packId);
    if (tags.some(function (t) { return t.color === "red"; })) return "red";
    if (tags.some(function (t) { return t.color === "yellow"; })) return "yellow";
    if (tags.some(function (t) { return t.color === "blue"; })) return "blue";
    return "green";
  }

  function repeatStatus(rep) {
    var db = daysBetween(rep.repeatExpiryDate);
    if (db === null) return "Active";
    if (db < 0) return "Expired";
    if (db <= 7) return "Due soon";
    return "Active";
  }

  function statusLabel(s) {
    return s === "red" ? "Critical" : s === "yellow" ? "Low stock" : s === "ceased" ? "Ceased" : "OK";
  }

  /* ---------- consumables calculations ---------- */

  function consumableAvgMonthlyUsage(item) {
    var log = item.stocktakeLog || [];
    if (!log.length) return Number(item.initialEstimatedMonthlyUsage) || 0;
    var recent = log.slice(-6);
    var sum = recent.reduce(function (t, l) { return t + (Number(l.calculatedMonthlyUsage) || 0); }, 0);
    return sum / recent.length;
  }

  function currentConsumableStock(item) {
    var baseline = Number(item.stock) || 0;
    var monthlyUsage = consumableAvgMonthlyUsage(item);
    var dailyUsage = monthlyUsage / 30;
    if (dailyUsage <= 0) return baseline;
    var asOfDate = item.stockAsOfDate || (item.createdAt ? item.createdAt.slice(0, 10) : todayISO());
    var today = todayISO();
    var daysSince = Math.max(0, Math.round((new Date(today) - new Date(asOfDate)) / 86400000));
    return Math.max(0, Math.round((baseline - dailyUsage * daysSince) * 10) / 10);
  }

  function consumableDaysLeft(item) {
    var usage = consumableAvgMonthlyUsage(item);
    if (usage <= 0) return null;
    return Math.floor(currentConsumableStock(item) / (usage / 30));
  }

  function consumableStatus(item) {
    var dl = consumableDaysLeft(item);
    var leadWeeks = Number(item.reorderLeadWeeks) > 0 ? Number(item.reorderLeadWeeks) : (CONSUMABLE_CATEGORY_LEAD_WEEKS[item.category] || 2);
    var leadDays = leadWeeks * 7;
    var stock = currentConsumableStock(item);
    if (dl === null) {
      if (stock <= 5) return "red";
      if (stock <= 20) return "yellow";
      return "green";
    }
    if (dl < leadDays) return "red";
    if (dl < leadDays * 2) return "yellow";
    return "green";
  }

  function consumableUsageTrend(item) {
    var log = item.stocktakeLog || [];
    if (log.length < 2) return "New";
    var latest = Number(log[log.length - 1].calculatedMonthlyUsage) || 0;
    var priorAvg = log.slice(0, -1).slice(-6).reduce(function (t, l) { return t + (Number(l.calculatedMonthlyUsage) || 0); }, 0) / Math.min(log.length - 1, 6);
    if (priorAvg <= 0) return "Stable";
    var change = (latest - priorAvg) / priorAvg;
    if (change > 0.15) return "Increased";
    if (change < -0.15) return "Decreased";
    return "Stable";
  }

  /* ---------- equipment calculations ---------- */

  function equipmentNeedsFollowUp(eq) {
    return eq.status === "Under repair" || eq.status === "Awaiting parts" || eq.status === "Awaiting NDIS approval";
  }

  function equipmentServiceDueDays(eq) {
    if (!eq.servicingIntervalDays || !eq.nextServiceDue) return null;
    return daysBetween(eq.nextServiceDue);
  }

  function equipmentServiceIsDue(eq) {
    var d = equipmentServiceDueDays(eq);
    return d !== null && d <= 0;
  }

  function equipmentInspectionDueDays(eq) {
    if (!eq.inspectionIntervalDays || !eq.nextInspectionDue) return null;
    return daysBetween(eq.nextInspectionDue);
  }

  function equipmentInspectionIsDue(eq) {
    var d = equipmentInspectionDueDays(eq);
    return d !== null && d <= 0;
  }

  function addAudit(houseId, actionType, details) {
    var entry = {
      id: uid("aud"),
      timestamp: new Date().toISOString(),
      user: state.user ? state.user.displayName : "Unknown",
      house: houseId,
      actionType: actionType,
      details: details
    };
    state.data[houseId].audit.unshift(entry);
  }

  function fmtDays(n) {
    return n + " day" + (n === 1 ? "" : "s");
  }

  function buildAlerts(houseId) {
    var h = state.data[houseId];
    var alerts = [];
    h.meds.forEach(function (m) {
      var st = medStatus(m);
      if (st === "ceased") return;
      if (m.expiryDate) {
        var db = daysBetween(m.expiryDate);
        if (db < 0) {
          alerts.push({ level: "critical", action: "Dispose & reorder", text: m.name + " (" + m.client + ") expired " + fmtDate(m.expiryDate) + " — remove from stock and order a replacement", tab: "medications", targetType: "med", targetId: m.id });
        } else if (db <= 30) {
          alerts.push({ level: "warning", action: "Reorder soon", text: m.name + " (" + m.client + ") expires in " + fmtDays(db) + " — order replacement stock before then", tab: "medications", targetType: "med", targetId: m.id });
        }
      }
      if (st === "red") {
        var dl = medDaysLeft(m);
        var when = dl === null ? "now" : dl <= 0 ? "immediately — out of stock" : "within " + fmtDays(dl);
        alerts.push({ level: "critical", action: "Order stock", text: m.name + " (" + m.client + ") critically low" + (dl !== null ? " (" + Math.max(dl, 0) + " days left)" : "") + " — order stock " + when, tab: "medications", targetType: "med", targetId: m.id });
      } else if (st === "yellow") {
        var dl2 = medDaysLeft(m);
        alerts.push({ level: "warning", action: "Plan reorder", text: m.name + " (" + m.client + ") low stock" + (dl2 !== null ? " (" + dl2 + " days left)" : "") + " — plan to reorder" + (dl2 !== null ? " within " + fmtDays(dl2) : ""), tab: "medications", targetType: "med", targetId: m.id });
      }
      if (recurringIsDue(m)) {
        var overdueDays = Math.abs(recurringDueDays(m));
        alerts.push({
          level: overdueDays > 3 ? "critical" : "warning",
          action: "Confirm delivery",
          text: m.name + " (" + m.client + ") — scheduled pharmacy delivery " + (overdueDays > 0 ? "overdue by " + fmtDays(overdueDays) : "due today") + ". Confirm once received.",
          tab: "medications",
          targetType: "recurring",
          targetId: m.id
        });
      }
    });
    h.repeats.forEach(function (r) {
      var rs = repeatStatus(r);
      if (rs === "Expired") {
        alerts.push({ level: "critical", action: "GP appointment", text: "Repeat expired for " + r.medName + " (" + r.client + ") — book a GP appointment to renew", tab: "medications", targetType: "med", targetId: r.medId });
      } else if (rs === "Due soon") {
        var db2 = daysBetween(r.repeatExpiryDate);
        alerts.push({ level: "warning", action: "GP appointment", text: "Repeat for " + r.medName + " (" + r.client + ") expires in " + fmtDays(db2) + " — book a GP appointment within " + fmtDays(Math.max(db2 - 1, 0)) + " to avoid a gap", tab: "medications", targetType: "med", targetId: r.medId });
      } else if (Number(r.repeatsRemaining) <= 1) {
        alerts.push({ level: "warning", action: "GP appointment", text: "Only " + r.repeatsRemaining + " repeat(s) left for " + r.medName + " (" + r.client + ") — book a GP appointment soon to renew before they run out", tab: "medications", targetType: "med", targetId: r.medId });
      }
    });
    h.audit.forEach(function (a) {
      if (a.actionType === "Incident flagged" && a.severity === "High") {
        var days = Math.abs(new Date() - new Date(a.timestamp)) / 86400000;
        if (days <= 14) {
          alerts.push({ level: "critical", action: "Review incident", text: "Incident: " + a.details, tab: "audit", targetType: "auditType", targetId: "Incident flagged" });
        }
      }
    });
    (h.consumables || []).forEach(function (c) {
      var st = consumableStatus(c);
      var dl = consumableDaysLeft(c);
      if (st === "red") {
        alerts.push({ level: "critical", action: "Order stock", text: c.name + (c.variant ? " (" + c.variant + ")" : "") + " for " + c.client + " critically low" + (dl !== null ? " (" + Math.max(dl, 0) + " days left)" : "") + " — order more", tab: "consumables", targetType: "consumable", targetId: c.id });
      } else if (st === "yellow") {
        alerts.push({ level: "warning", action: "Plan reorder", text: c.name + (c.variant ? " (" + c.variant + ")" : "") + " for " + c.client + " running low" + (dl !== null ? " (" + dl + " days left)" : "") + " — plan to reorder", tab: "consumables", targetType: "consumable", targetId: c.id });
      }
      var log = c.stocktakeLog || [];
      if (log.length && log[log.length - 1].abnormal) {
        alerts.push({ level: "warning", action: "Review usage", text: "Usage of " + c.name + (c.variant ? " (" + c.variant + ")" : "") + " for " + c.client + " changed significantly at the last stocktake — worth a review", tab: "consumables", targetType: "consumable", targetId: c.id });
      }
    });
    (h.equipment || []).forEach(function (eq) {
      if (equipmentNeedsFollowUp(eq)) {
        var since = eq.dateReported ? daysBetween(eq.dateReported) : null;
        var lateness = since !== null && since < -14 ? " (reported " + fmtDays(Math.abs(since)) + " ago)" : "";
        alerts.push({ level: since !== null && since < -14 ? "critical" : "warning", action: "Follow up repair", text: eq.name + " for " + eq.client + " is " + eq.status.toLowerCase() + lateness, tab: "equipment", targetType: "equipment", targetId: eq.id });
      }
      if (equipmentServiceIsDue(eq)) {
        var svcOverdue = Math.abs(equipmentServiceDueDays(eq));
        alerts.push({ level: svcOverdue > 14 ? "critical" : "warning", action: "Arrange servicing", text: eq.name + " for " + eq.client + " — servicing " + (svcOverdue > 0 ? "overdue by " + fmtDays(svcOverdue) : "due today"), tab: "equipment", targetType: "equipment", targetId: eq.id });
      }
      if (equipmentInspectionIsDue(eq)) {
        var inspOverdue = Math.abs(equipmentInspectionDueDays(eq));
        alerts.push({ level: inspOverdue > 14 ? "critical" : "warning", action: "Arrange safety inspection", text: eq.name + " for " + eq.client + " — safety inspection " + (inspOverdue > 0 ? "overdue by " + fmtDays(inspOverdue) : "due today"), tab: "equipment", targetType: "equipment", targetId: eq.id });
      }
    });
    (h.discrepancies || []).forEach(function (d) {
      if (d.status !== "open") return;
      var hint = d.suggestedReason ? " Likely: " + d.suggestedReason + "." : "";
      if (d.tier === "large") {
        alerts.push({ level: "critical", action: "Urgent: resolve discrepancy", text: d.medName + " (" + d.client + ") — expected ~" + d.expectedStock + ", counted " + d.actualStock + " (~" + d.varianceDoses + " dose equivalent). Needs urgent review." + hint, tab: "medications", targetType: "discrepancy", targetId: d.id });
      } else {
        alerts.push({ level: "warning", action: "Review discrepancy", text: d.medName + " (" + d.client + ") — expected ~" + d.expectedStock + ", counted " + d.actualStock + " (~" + d.varianceDoses + " dose equivalent). Possible missed documentation or loss." + hint, tab: "medications", targetType: "discrepancy", targetId: d.id });
      }
    });
    alerts.forEach(function (a) {
      a.id = (a.targetType || "x") + ":" + (a.targetId || "x") + ":" + a.action;
      a.house = houseId;
    });

      return a.level === "critical" ? -1 : 1;

  /* ---------- alert workflow (assign / in progress / resolved) ---------- */

  function attachWorkflow(houseId, liveAlerts) {
    var h = state.data[houseId];
    var tasks = h.alertTasks || (h.alertTasks = []);
    var liveIds = {};
    var result = [];

    liveAlerts.forEach(function (a) {
      liveIds[a.id] = true;
      var task = tasks.find(function (t) { return t.id === a.id; });
      if (task && task.status === "In Progress") {
        a.workflowStatus = "In Progress";
        a.assignedTo = task.assignedTo;
        a.actionTaken = task.actionTaken;
        a.actionAt = task.actionAt;
      } else {
        // No task yet, or it was previously resolved but the same issue is active again —
        // either way this needs fresh attention.
        a.workflowStatus = "Action Required";
      }
      result.push(a);
    });

    // In-progress tasks whose underlying alert has stopped firing live still need to be
    // seen and explicitly resolved, so they don't just silently vanish.
    tasks.forEach(function (t) {
      if (t.status === "In Progress" && !liveIds[t.id]) {
        result.push({
          id: t.id, house: houseId, level: t.level, action: t.action, text: t.text, tab: t.tab,
          targetType: t.targetType, targetId: t.targetId,
          workflowStatus: "In Progress", assignedTo: t.assignedTo, actionTaken: t.actionTaken, actionAt: t.actionAt,
          orphaned: true
        });
      }
    });

    return result;
  }

    return { ok: true, accessToken: data.access_token, refreshToken: data.refresh_token, authUser: data.user };

    });
    var data = await res.json().catch(function () { return {}; });

  async function tryRefreshSession() {
    if (!state.user || !state.user.refreshToken) return false;
    var r = await supabaseAuthRefresh(state.user.refreshToken);

  var storageAdapter = {
    async get(key, _retried) {
      try {
        var res = await fetch(
          SUPABASE_URL + "/rest/v1/app_storage?key=eq." + encodeURIComponent(key) + "&select=value",
          {
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": "Bearer " + authHeader()
            }
          }
        );
        if (res.status === 401 && !_retried && (await tryRefreshSession())) {
          return storageAdapter.get(key, true);
        }
        if (!res.ok) {
          var bodyText = await res.text().catch(function () { return ""; });
          throw new Error("Supabase get failed: " + res.status + " " + bodyText);
        }
        var rows = await res.json();
        if (!rows.length) return null;
        return { key: key, value: rows[0].value };
      } catch (e) {
        lastStorageError = "GET " + key + ": " + (e && e.message ? e.message : String(e));
        console.error("NexTrace: Supabase get failed, falling back to localStorage", e);
        try {
          var raw = localStorage.getItem(key);
          return raw === null ? null : { key: key, value: raw };
        } catch (e2) {
          return null;
        }
      }
    },
    async set(key, value, _retried) {
      try {
        var res = await fetch(SUPABASE_URL + "/rest/v1/app_storage?on_conflict=key", {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + authHeader(),
            "Content-Type": "application/json",
            "Prefer": "resolution=merge-duplicates"
          },
          body: JSON.stringify({ key: key, value: value, org_id: state.user ? state.user.orgId : null })
        });
        if (res.status === 401 && !_retried && (await tryRefreshSession())) {
          return storageAdapter.set(key, value, true);
        }
        if (!res.ok) {
          var bodyText2 = await res.text().catch(function () { return ""; });
          throw new Error("Supabase set failed: " + res.status + " " + bodyText2);
        }
        lastStorageError = "";
        try { localStorage.setItem(key, value); } catch (e3) {}
        return { key: key, value: value };
      } catch (e) {
        lastStorageError = "SET " + key + ": " + (e && e.message ? e.message : String(e));
        console.error("NexTrace: Supabase set failed, falling back to localStorage only", e);
        try {
          localStorage.setItem(key, value);
          return { key: key, value: value };
        } catch (e2) {
          throw e;
        }
      }
    }
  };

  /* ---------- Coordinator of Supports preview dashboard ---------- */

  function trendColor(trend) {
    if (trend === "Increased") return "yellow";
    if (trend === "Decreased") return "blue";
    if (trend === "New") return "gray";
    return "green";
  }

    var options = [];

      var hd = state.data[hid];

    options.sort(function (a, b) { return a.name.localeCompare(b.name); });

          "</div>" +
          '<div class="panel">' +

    return (

      "</div>" +
      saveErrorBanner() +
      '<div class="page">' +

  function renderShell() {

      '<div class="topbar-user"><span>' + esc(state.user.displayName) + '</span><button class="btn btn-ghost btn-sm" data-action="logout">' + icon("logout") + " Sign out</button></div>" +

  /* ---------- dashboard ---------- */

  function isMedRelatedAlert(a) {
    return a.targetType !== "consumable" && a.targetType !== "equipment";
  }

  function globalSearchResults() {
    var q = (state.globalSearch || "").trim().toLowerCase();
    if (!q) return [];
    var results = [];
    (state.user.houses || []).forEach(function (hid) {
      var h = state.data[hid];
      if (!h) return;
      var hLabel = houseLabel(hid);
      (h.meds || []).forEach(function (m) {
        if ((m.name + " " + m.client).toLowerCase().indexOf(q) !== -1) {
          results.push({ type: "Medication", label: m.name, sub: m.client + " · " + hLabel, houseId: hid, targetType: "med", targetId: m.id });
        }
      });
      (h.clients || []).forEach(function (c) {
        if (c.name.toLowerCase().indexOf(q) !== -1) {
          results.push({ type: "Client", label: c.name, sub: hLabel, houseId: hid, targetType: "client", targetId: c.id });
        }
      });
      (h.consumables || []).forEach(function (c) {
        if ((c.name + " " + (c.variant || "") + " " + c.client + " " + c.category).toLowerCase().indexOf(q) !== -1) {
          results.push({ type: "Consumable", label: c.name + (c.variant ? " (" + c.variant + ")" : ""), sub: c.client + " · " + hLabel, houseId: hid, targetType: "consumable", targetId: c.id });
        }
      });
      (h.equipment || []).forEach(function (eq) {
        if ((eq.name + " " + eq.client).toLowerCase().indexOf(q) !== -1) {
          results.push({ type: "Equipment", label: eq.name, sub: eq.client + " · " + hLabel, houseId: hid, targetType: "equipment", targetId: eq.id });
        }
      });
      (h.websterPacks || []).forEach(function (p) {
        if (p.name.toLowerCase().indexOf(q) !== -1) {
          results.push({ type: "Webster Pack", label: p.name, sub: hLabel, houseId: hid, targetType: "pack", targetId: p.id });
        }
      });
    });
    return results.slice(0, 40);
  }

  function renderDashboard() {
    var h = houseData();
    var counts = { red: 0, yellow: 0, green: 0, ceased: 0 };
    h.meds.forEach(function (m) { counts[medStatus(m)]++; });
    var alerts = buildAlerts(state.houseId);
    if (isClinical()) alerts = alerts.filter(isMedRelatedAlert);
    var allowed = allowedTabs();
    var medsAllowed = allowed.indexOf("medications") !== -1;

    var alertsHtml = alerts.length
      ? alerts.slice(0, 12).map(function (a) {
          var tagColor = ACTION_TAG_COLORS[a.action] || "gray";
          var clickable = allowed.indexOf(a.tab) !== -1;
          var attrs = clickable ? ' data-action="open-alert" data-tab="' + a.tab + '" data-target-type="' + (a.targetType || "") + '" data-target-id="' + esc(a.targetId || "") + '"' : "";
          var cls = "alert-row alert-" + a.level + (clickable ? "" : " alert-static");
          return '<div class="' + cls + '"' + attrs + '>' +
            '<span class="alert-icon">' + icon("alert") + "</span>" +
            '<span class="alert-text-wrap"><span class="audit-badge badge-' + tagColor + '">' + esc(a.action) + "</span> " + esc(a.text) + "</span></div>";
        }).join("")
      : '<div class="empty-inline">No active alerts for ' + houseLabel(state.houseId) + ". All medications, stock and repeats look on track.</div>";


    function summaryCard(cls, status, count, label) {
      var attrs = medsAllowed ? ' data-action="dashboard-filter" data-status="' + status + '"' : "";
      var extraCls = medsAllowed ? "" : " summary-static";
      return '<div class="summary-card ' + cls + extraCls + '"' + attrs + '><div class="summary-num">' + count + '</div><div class="summary-label">' + statusDot(status) + " " + label + "</div></div>";
    }

    var medActions = '<button class="btn btn-secondary btn-block" data-action="open-modal" data-modal="stockCheck">' + icon("clipboard") + " Medication stock check</button>" +
      '<button class="btn btn-secondary btn-block" data-action="open-modal" data-modal="addDelivery">' + icon("truck") + " Add medication delivery</button>";
    if (medsAllowed) {
      medActions += '<button class="btn btn-secondary btn-block" data-action="set-tab" data-tab="medications">' + icon("pill") + " View medications</button>";
    }

    var conActions = '<button class="btn btn-secondary btn-block" data-action="open-modal" data-modal="consumableStockCheck">' + icon("box") + " Consumables stocktake</button>" +
      '<button class="btn btn-secondary btn-block" data-action="open-modal" data-modal="addConsumableDelivery">' + icon("truck") + " Add consumable delivery</button>";
    if (allowed.indexOf("consumables") !== -1) {
      conActions += '<button class="btn btn-secondary btn-block" data-action="set-tab" data-tab="consumables">' + icon("box") + " View consumables</button>";
    }

    var otherActions = "";
    if (allowed.indexOf("equipment") !== -1) {
      otherActions += '<button class="btn btn-secondary btn-block" data-action="set-tab" data-tab="equipment">' + icon("wrench") + " View equipment</button>";
    }
    if (allowed.indexOf("audit") !== -1) {
      otherActions += '<button class="btn btn-secondary btn-block" data-action="set-tab" data-tab="audit">' + icon("log") + " View audit log</button>";
    }
    if (!isSupportWorker()) {
      otherActions += '<button class="btn btn-secondary btn-block" data-action="open-modal" data-modal="flagIncident">' + icon("flag") + " Flag incident</button>";
    }

    var quickActions =
      '<div class="quick-action-group-label">Medications</div>' + medActions +
      (isClinical() ? "" : '<div class="quick-action-group-label">Consumables</div>' + conActions) +
      (otherActions ? '<div class="quick-action-group-label">Other</div>' + otherActions : "");

    var searchQuery = (state.globalSearch || "").trim();
    var searchResults = searchQuery ? globalSearchResults() : [];
    var searchResultsHtml = searchQuery ? (
      '<div class="panel" style="margin-bottom:16px">' +
      '<div class="panel-head">Search results <span class="badge-count">' + searchResults.length + "</span></div>" +
      (searchResults.length
        ? searchResults.map(function (r) {
            return '<div class="row-card" data-action="go-to-search-result" data-house="' + r.houseId + '" data-type="' + r.targetType + '" data-id="' + esc(r.targetId) + '" style="cursor:pointer">' +
              '<div style="flex:1"><div class="row-title">' + esc(r.label) + '</div><div class="row-sub">' + esc(r.type) + " · " + esc(r.sub) + "</div></div>" +
              "</div>";
          }).join("")
        : '<div class="empty-inline">No matches for "' + esc(searchQuery) + '" across your houses.</div>') +
      "</div>"
    ) : "";

    return (
      '<h1 class="page-title">' + esc(houseLabel(state.houseId)) + " Dashboard</h1>" +
      '<div class="search-box" style="margin-bottom:16px">' + icon("search") + '<input id="globalSearchInput" placeholder="Search medications, clients, consumables, equipment, Webster Packs…" value="' + esc(state.globalSearch) + '" data-input="globalSearch" /></div>' +
      searchResultsHtml +
      '<div class="summary-grid">' +
      summaryCard("sc-red", "red", counts.red, "Critical") +
      summaryCard("sc-yellow", "yellow", counts.yellow, "Low stock") +
      summaryCard("sc-green", "green", counts.green, "OK") +
      summaryCard("sc-ceased", "ceased", counts.ceased, "Ceased") +
      "</div>" +
      '<div class="two-col">' +
      '<div class="panel">' +
      '<div class="panel-head">Alerts <span class="badge-count">' + alerts.length + "</span></div>" +
      '<div class="alert-list">' + alertsHtml + "</div>" +
      "</div>" +
      '<div class="panel">' +
      '<div class="panel-head">Quick actions</div>' +
      '<div class="quick-actions">' + quickActions + "</div>" +
      "</div>" +
      "</div>"
    );
  }

  /* ---------- all houses overview ---------- */

  function renderAllHouses() {
    var houseIds = (state.user.houses || []).slice().sort(function (a, b) { return a - b; });
    var combined = [];
    houseIds.forEach(function (hid) {
      var houseAlerts = buildAlerts(hid);
      if (isClinical()) houseAlerts = houseAlerts.filter(isMedRelatedAlert);
      houseAlerts.forEach(function (a) {
        a.houseId = hid;
        combined.push(a);
      });
    });

    var sort = state.allHousesSort;
    if (sort === "house") {
      combined.sort(function (a, b) { return a.houseId - b.houseId; });
    } else if (sort === "type") {
      combined.sort(function (a, b) { return a.action.localeCompare(b.action); });
    } else {
      combined.sort(function (a, b) {
        if (a.level === b.level) return a.houseId - b.houseId;
        return a.level === "critical" ? -1 : 1;
      });
    }

    var critCount = combined.filter(function (a) { return a.level === "critical"; }).length;
    var warnCount = combined.length - critCount;

    var rows = combined.length ? combined.map(function (a) {
      var col = HOUSE_COLORS[a.houseId] || { base: "#0F6E63", tint: "#E3F1EE" };
      var tagColor = ACTION_TAG_COLORS[a.action] || "gray";
      var h = state.data[a.houseId];
      var hoverTitle = "";
      if (h) {
        var counts2 = { red: 0, yellow: 0, green: 0 };
        h.meds.forEach(function (m) { counts2[medStatus(m)]++; });
        hoverTitle = houseLabel(a.houseId) + ": " + counts2.red + " critical, " + counts2.yellow + " low, " + counts2.green + " ok";
      }
      return '<div class="alert-row alert-' + a.level + '" data-action="open-alert-house" data-house="' + a.houseId + '" data-tab="' + a.tab + '" data-target-type="' + (a.targetType || "") + '" data-target-id="' + esc(a.targetId || "") + '">' +
        '<span class="alert-icon">' + icon("alert") + "</span>" +
        '<span class="alert-text-wrap">' +
        '<span class="house-tag" title="' + esc(hoverTitle) + '" style="background:' + col.tint + ";color:" + col.base + '">' + esc(houseLabel(a.houseId)) + "</span> " +
        '<span class="audit-badge badge-' + tagColor + '">' + esc(a.action) + "</span> " + esc(a.text) +
        "</span></div>";
    }).join("") : '<div class="empty-inline">No active alerts across any of your houses. Everything looks on track.</div>';

    return (
      '<div class="page-head-row"><h1 class="page-title">All Houses</h1>' +
      '<div style="display:flex;gap:10px;flex-wrap:wrap">' +
      '<button class="btn btn-ghost btn-sm" data-action="load-sample-all-houses">' + icon("box") + " Load sample data (all houses)</button>" +
      '<select data-input="allHousesSort" class="select-filter">' +
      '<option value="severity"' + (sort === "severity" ? " selected" : "") + ">Sort: Severity</option>" +
      '<option value="house"' + (sort === "house" ? " selected" : "") + ">Sort: House</option>" +
      '<option value="type"' + (sort === "type" ? " selected" : "") + ">Sort: Alert type</option>" +
      "</select></div></div>" +
      '<p class="page-sub">Every alert across your ' + houseIds.length + " houses in one place — " + critCount + " critical, " + warnCount + ' warning. Hover a house tag on desktop for a quick stock summary, or tap an alert to open it directly.</p>' +
      '<div class="panel"><div class="alert-list">' + rows + "</div></div>"
    );
  }

  function renderAllHousesScreen() {
    return (
      '<div class="app-shell">' +
      '<div class="topbar">' +
      '<div class="topbar-brand">' + icon("pill") + " NexTrace</div>" +
      '<div class="topbar-house"><button class="btn btn-ghost btn-sm" data-action="back-to-house-select">' + icon("house") + " Back to house selection</button></div>" +
      '<div class="topbar-user"><span>' + esc(state.user.displayName) + '</span><button class="btn btn-ghost btn-sm" data-action="logout">' + icon("logout") + " Sign out</button></div>" +
