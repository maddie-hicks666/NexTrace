  /* ---------- ops overview (Admin / Clinical landing) ---------- */

  function kpiColor(n) {
    if (n <= 0) return "green";
    if (n <= 2) return "yellow";
    if (n <= 5) return "orange";
    return "red";
  }

  function opsAlertRow(a) {
    var col = HOUSE_COLORS[a.house] || { base: "#0F6E63", tint: "#E3F1EE" };
    var tagColor = ACTION_TAG_COLORS[a.action] || "gray";
    var statusBadge = a.workflowStatus === "In Progress"
      ? '<span class="audit-badge badge-blue">In Progress</span>'
      : '<span class="audit-badge badge-gray">Action Required</span>';
    var assignedLine = a.workflowStatus === "In Progress"
      ? '<div class="ops-assigned-line">' + (a.actionTaken ? esc(a.actionTaken) + " — " : "") + "assigned to " + esc(a.assignedTo) + (a.actionAt ? " · " + fmtDate(a.actionAt.slice(0, 10)) : "") + "</div>"
      : "";
    var buttons = "";
    if (a.workflowStatus === "In Progress") {
      buttons =
        '<button class="btn btn-secondary btn-sm" data-action="resolve-alert" data-house="' + a.house + '" data-alert-id="' + esc(a.id) + '">Mark resolved</button>' +
        '<button class="btn btn-ghost btn-sm" data-action="review-alert" data-house="' + a.house + '" data-tab="' + a.tab + '" data-target-type="' + (a.targetType || "") + '" data-target-id="' + esc(a.targetId || "") + '">Review</button>';
    } else {
      buttons =
        '<button class="btn btn-secondary btn-sm" data-action="assign-alert-me" data-house="' + a.house + '" data-alert-id="' + esc(a.id) + '" data-level="' + a.level + '" data-alert-action="' + esc(a.action) + '" data-text="' + esc(a.text) + '" data-tab="' + a.tab + '" data-target-type="' + (a.targetType || "") + '" data-target-id="' + esc(a.targetId || "") + '">Assign to me</button>' +
        '<button class="btn btn-ghost btn-sm" data-action="open-action-note" data-house="' + a.house + '" data-alert-id="' + esc(a.id) + '" data-level="' + a.level + '" data-alert-action="' + esc(a.action) + '" data-text="' + esc(a.text) + '" data-tab="' + a.tab + '" data-target-type="' + (a.targetType || "") + '" data-target-id="' + esc(a.targetId || "") + '">Action</button>' +
        '<button class="btn btn-ghost btn-sm" data-action="review-alert" data-house="' + a.house + '" data-tab="' + a.tab + '" data-target-type="' + (a.targetType || "") + '" data-target-id="' + (a.targetId || "") + '">Review</button>';
    }
    return '<div class="ops-action-row ops-action-' + a.level + '">' +
      '<div class="ops-action-main">' +
      '<span class="house-tag" style="background:' + col.tint + ";color:" + col.base + '">' + esc(houseLabel(a.house)) + "</span>" +
      '<span class="audit-badge badge-' + tagColor + '">' + esc(a.action) + "</span> " + statusBadge +
      '<div class="ops-action-text">' + esc(a.text) + "</div>" +
      assignedLine +
      "</div>" +
      '<div class="ops-action-buttons">' + buttons + "</div>" +
      "</div>";
  }

  function renderChangesSinceLogin() {
    var since = state.sinceLastLogin;
    if (!since) {
      return '<p class="muted" style="margin:0">First login on this account — nothing to compare yet. Check back next time you log in.</p>';
    }
    var houseIds = (state.user.houses || []);
    var entries = [];
    houseIds.forEach(function (hid) {
      var h = state.data[hid];
      if (!h) return;
      (h.audit || []).forEach(function (a) {
        if (a.timestamp > since) entries.push({ house: hid, timestamp: a.timestamp, actionType: a.actionType, details: a.details, user: a.user });
      });
    });
    entries.sort(function (a, b) { return b.timestamp.localeCompare(a.timestamp); });
    if (!entries.length) {
      return '<p class="muted" style="margin:0">No changes since your last login on ' + fmtDateTime(since) + ".</p>";
    }
    var shown = entries.slice(0, 10);
    var html = '<p class="muted" style="margin:0 0 10px">' + entries.length + " update(s) since your last login on " + fmtDateTime(since) + ".</p>";
    html += shown.map(function (e) {
      var col = HOUSE_COLORS[e.house] || { base: "#0F6E63", tint: "#E3F1EE" };
      return '<div class="mini-row"><span class="house-tag" style="background:' + col.tint + ";color:" + col.base + '">' + esc(houseLabel(e.house)) + "</span> " + fmtDateTime(e.timestamp) + " — <strong>" + esc(e.actionType) + "</strong>: " + esc(e.details) + "</div>";
    }).join("");
    return html;
  }

  function renderOpsOverviewScreen() {
    var allAlerts = getAllOpsAlerts();
    var critical = allAlerts.filter(function (a) { return a.level === "critical"; });
    var actionRequired = allAlerts.filter(function (a) { return a.workflowStatus === "Action Required"; });
    var inProgress = allAlerts.filter(function (a) { return a.workflowStatus === "In Progress"; });
    var medCount = allAlerts.filter(function (a) { return a.targetType === "med" || a.targetType === "discrepancy" || a.targetType === "recurring"; }).length;
    var conCount = allAlerts.filter(function (a) { return a.targetType === "consumable"; }).length;
    var repairCount = allAlerts.filter(function (a) { return a.targetType === "equipment"; }).length;
    var scriptsCount = allAlerts.filter(function (a) { return a.action === "GP appointment"; }).length;
    var totalHouses = (state.user.houses || []).length;
    var housesWithIssues = {};
    allAlerts.forEach(function (a) { housesWithIssues[a.house] = true; });
    var housesWithIssuesCount = Object.keys(housesWithIssues).length;

    var sorted = allAlerts.slice().sort(function (a, b) {
      var scoreA = (a.level === "critical" ? 0 : 2) + (a.workflowStatus === "Action Required" ? 0 : 1);
      var scoreB = (b.level === "critical" ? 0 : 2) + (b.workflowStatus === "Action Required" ? 0 : 1);
      return scoreA - scoreB;
    });

    var priorityBanner = critical.length
      ? '<div class="priority-banner priority-critical">' + icon("alert") + " " + critical.length + " critical issue" + (critical.length === 1 ? "" : "s") + " need" + (critical.length === 1 ? "s" : "") + " attention across " + housesWithIssuesCount + " house" + (housesWithIssuesCount === 1 ? "" : "s") + ".</div>"
      : '<div class="priority-banner priority-ok">' + icon("house") + " No critical issues right now" + (inProgress.length ? " — " + inProgress.length + " item(s) in progress." : ".") + "</div>";

    var resolvedThisWeek = 0;
    (state.user.houses || []).forEach(function (hid) {
      var h = state.data[hid];
      if (!h) return;
      (h.alertTasks || []).forEach(function (t) {
        if (t.status === "Resolved" && t.resolvedAt && daysBetween(t.resolvedAt.slice(0, 10)) >= -7) resolvedThisWeek++;
      });
    });

    return (
      '<div class="app-shell">' +
      '<div class="topbar">' +
      '<div class="topbar-brand">' + icon("pill") + " NexTrace</div>" +
      '<div class="topbar-house"><button class="btn btn-ghost btn-sm" data-action="browse-houses">' + icon("house") + " Browse houses</button></div>" +
      '<div class="topbar-user"><span>' + esc(state.user.displayName) + '</span><button class="btn btn-ghost btn-sm" data-action="logout">' + icon("logout") + " Sign out</button></div>" +
      "</div>" +
      saveErrorBanner() +
      priorityBanner +
      '<div class="page">' +
      '<h1 class="page-title">Operations Overview</h1>' +
      '<p class="page-sub">Status across all ' + totalHouses + " houses you oversee.</p>" +
      '<div class="kpi-grid">' +
      '<div class="summary-card sc-' + kpiColor(actionRequired.length) + '"><div class="summary-num">' + actionRequired.length + '</div><div class="summary-label">Attention Required</div></div>' +
      '<div class="summary-card sc-' + kpiColor(medCount) + '"><div class="summary-num">' + medCount + '</div><div class="summary-label">Medication Alerts</div></div>' +
      '<div class="summary-card sc-' + kpiColor(conCount) + '"><div class="summary-num">' + conCount + '</div><div class="summary-label">Consumable Alerts</div></div>' +
      '<div class="summary-card sc-' + kpiColor(repairCount) + '"><div class="summary-num">' + repairCount + '</div><div class="summary-label">Repairs</div></div>' +
      '<div class="summary-card sc-' + kpiColor(scriptsCount) + '"><div class="summary-num">' + scriptsCount + '</div><div class="summary-label">Scripts Expiring</div></div>' +
      '<div class="summary-card sc-' + (housesWithIssuesCount === 0 ? "green" : "yellow") + '"><div class="summary-num">' + totalHouses + '</div><div class="summary-label">Houses' + (housesWithIssuesCount ? " (" + housesWithIssuesCount + " need attention)" : "") + "</div></div>" +
      "</div>" +
      '<div class="two-col">' +
      '<div class="panel">' +
      '<div class="panel-head">Today\'s Actions <span class="badge-count">' + sorted.length + "</span></div>" +
      '<div class="ops-action-list">' + (sorted.length ? sorted.map(opsAlertRow).join("") : '<div class="empty-inline">Nothing needs action right now.</div>') + "</div>" +
      "</div>" +
      '<div class="stack" style="gap:16px">' +
      '<div class="panel">' +
      '<div class="panel-head">What\'s Changed Since Your Last Login</div>' +
      '<div style="padding:16px">' + renderChangesSinceLogin() + "</div>" +
      "</div>" +
      '<div class="panel">' +
      '<div class="panel-head">Operational Health</div>' +
      '<div class="ops-health" style="padding:16px">' +
      '<div class="mini-row">' + (totalHouses - housesWithIssuesCount) + " of " + totalHouses + " houses have no active alerts</div>" +
      '<div class="mini-row">' + inProgress.length + " item(s) currently in progress</div>" +
      '<div class="mini-row">' + resolvedThisWeek + " item(s) resolved in the last 7 days</div>" +
      "</div>" +
      "</div>" +
      "</div>" +
      "</div>" +
      '<div id="modalRoot"></div>' +
      "</div>" +
      "</div>"
    );
  }

  /* ---------- medications ---------- */

  function filteredMeds() {
    var h = houseData();
    var q = state.medSearch.trim().toLowerCase();
    return h.meds.filter(function (m) {
      if (state.medFilter !== "all" && medStatus(m) !== state.medFilter) return false;
      if (!q) return true;
      return (m.name + " " + m.client).toLowerCase().indexOf(q) !== -1;
    });
  }

  function renderMedications() {
    var meds = filteredMeds();
    var rows = meds.map(function (m) {
      var st = medStatus(m);
      var dl = medDaysLeft(m);
      var due = recurringIsDue(m);
      var pack = m.websterPackId ? houseData().websterPacks.find(function (p) { return p.id === m.websterPackId; }) : null;
      return '<div class="med-row">' +
        '<div class="med-row-main" data-action="open-med-detail" data-id="' + m.id + '" style="cursor:pointer">' +
        statusDot(st) +
        '<div><div class="med-name">' + esc(m.name) + (due ? ' <span class="audit-badge badge-blue">Delivery due</span>' : "") + (pack ? ' <span class="audit-badge">' + esc(pack.name) + "</span>" : "") + '</div><div class="med-sub">' + esc(m.client) + " · " + esc(m.type) + (m.route ? " · " + esc(m.route) : "") + (st === "ceased" ? " · Ceased " + fmtDate(m.ceaseDate) : "") + "</div></div>" +
        "</div>" +
        '<div class="med-row-stats">' +
        '<div class="stat"><span class="stat-label">Stock</span><span class="stat-val">' + currentMedStock(m) + " " + esc(m.unit) + "</span></div>" +
        '<div class="stat"><span class="stat-label">Days left</span><span class="stat-val">' + (st === "ceased" ? "—" : dl === null ? "—" : Math.max(dl, 0)) + "</span></div>" +
        '<div class="stat"><span class="stat-label">Expiry</span><span class="stat-val">' + fmtDate(m.expiryDate) + "</span></div>" +
        (due ? '<button class="btn btn-primary btn-sm" data-action="open-confirm-recurring" data-id="' + m.id + '">Confirm</button>' : "") +
        "</div>" +
        "</div>";
    }).join("");

    var empty = !meds.length ? (
      '<div class="empty-block">' +
      '<p>' + (houseData().meds.length ? "No medications match your filters." : "No medications recorded for " + houseLabel(state.houseId) + " yet.") + "</p>" +
      (houseData().meds.length ? "" : '<button class="btn btn-secondary btn-sm" data-action="load-sample">Load sample data</button>') +
      "</div>"
    ) : "";

    var openDiscCount = houseData().discrepancies.filter(function (d) { return d.status === "open"; }).length;

    return (
      '<div class="page-head-row"><h1 class="page-title">Medications</h1>' +
      '<div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-secondary" data-action="open-modal" data-modal="stockCheck">' + icon("clipboard") + " Medication stock check</button>" +
      '<button class="btn btn-secondary" data-action="open-modal" data-modal="addDelivery">' + icon("truck") + " Log delivery</button>" +
      '<button class="btn btn-ghost" data-action="open-modal" data-modal="exportMeds">' + icon("clipboard") + " Export</button>" +
      '<button class="btn ' + (openDiscCount ? "btn-danger" : "btn-ghost") + '" data-action="open-modal" data-modal="discrepancies">' + icon("alert") + " Discrepancies" + (openDiscCount ? ' <span class="badge-count" style="margin-left:4px">' + openDiscCount + "</span>" : "") + "</button>" +
      '<button class="btn btn-primary" data-action="open-modal" data-modal="addMed">' + icon("plus") + " Add medication</button></div></div>" +
      '<div class="filter-row">' +
      '<div class="search-box">' + icon("search") + '<input id="medSearchInput" placeholder="Search by medication or client" value="' + esc(state.medSearch) + '" data-input="medSearch" /></div>' +
      '<select data-input="medFilter" class="select-filter">' +
      '<option value="all"' + (state.medFilter === "all" ? " selected" : "") + ">All statuses</option>" +
      '<option value="red"' + (state.medFilter === "red" ? " selected" : "") + ">Critical</option>" +
      '<option value="yellow"' + (state.medFilter === "yellow" ? " selected" : "") + ">Low stock</option>" +
      '<option value="green"' + (state.medFilter === "green" ? " selected" : "") + ">OK</option>" +
      '<option value="ceased"' + (state.medFilter === "ceased" ? " selected" : "") + ">Ceased</option>" +
      "</select>" +
      "</div>" +
      '<div class="med-list">' + rows + empty + "</div>" +
      renderWebsterPackSection() +
      renderMedDeliveriesSection() +
      renderMedRepeatsSection()
    );
  }

  function renderWebsterPackSection() {
    var h = houseData();
    var packs = h.websterPacks.slice().sort(function (a, b) { return a.name.localeCompare(b.name); });
    var cards = packs.map(function (p) {
      var meds = packMeds(h, p.id);
      var issues = packIssueTags(h, p.id);
      var color = packWorstColor(h, p.id);
      return '<div class="row-card" data-action="open-pack-detail" data-id="' + p.id + '" style="cursor:pointer">' +
        statusDot(color === "blue" ? "yellow" : color) +
        '<div style="flex:1"><div class="row-title">' + esc(p.name) + '</div><div class="row-sub">' + meds.length + " medication" + (meds.length === 1 ? "" : "s") +
        (issues.length ? " · " + issues.length + " issue" + (issues.length === 1 ? "" : "s") + " flagged" : " · No issues") + "</div></div>" +
        '<button class="btn btn-ghost btn-sm" data-action="open-pack-detail" data-id="' + p.id + '">View</button>' +
        "</div>";
    }).join("");
    return (
      '<div class="section-divider"></div>' +
      '<div class="page-head-row"><h2 class="section-title" style="margin:0">Webster Packs</h2>' +
      '<button class="btn btn-secondary btn-sm" data-action="new-webster-pack">' + icon("plus") + " New Webster Pack</button></div>" +
      (packs.length ? '<div class="med-list">' + cards + "</div>" : '<p class="muted">No Webster Packs set up for ' + esc(houseLabel(state.houseId)) + " yet. A Webster Pack groups medications that are supplied together, while still tracking each medication's own script, expiry and repeats.</p>")
    );
  }

  function renderPackDetailModal() {
    var h = houseData();
    var pack = h.websterPacks.find(function (p) { return p.id === state.modal.packId; });
    if (!pack) return "";
    var meds = packMeds(h, pack.id);
    var unassigned = h.meds.filter(function (m) { return !m.websterPackId; });
    var medRows = meds.map(function (m) {
      var tags = medIssueTags(m);
      return '<div class="row-card">' +
        statusDot(medStatus(m)) +
        '<div style="flex:1" data-action="open-med-detail" data-id="' + m.id + '" style="cursor:pointer">' +
        '<div class="row-title">' + esc(m.name) + '</div><div class="row-sub">' + esc(m.client) +
        (tags.length ? " · " + tags.map(function (t) { return esc(t.label); }).join(", ") : " · No issues") + "</div></div>" +
        '<button class="btn btn-ghost btn-sm" data-action="unassign-pack-med" data-id="' + m.id + '">Remove from pack</button>' +
        "</div>";
    }).join("");
    var assignRow = unassigned.length ?
      '<div class="form-grid" style="margin-top:14px">' +
      '<label class="field"><span>Add an existing medication to this pack</span><select id="packAssignSelect">' +
      '<option value="">Select medication</option>' +
      unassigned.map(function (m) { return '<option value="' + m.id + '">' + esc(m.name) + " (" + esc(m.client) + ")</option>"; }).join("") +
      "</select></label>" +
      '<button type="button" class="btn btn-secondary" data-action="assign-pack-med" data-pack-id="' + pack.id + '" style="align-self:end">Add to pack</button>' +
      "</div>" :
      '<p class="muted" style="margin-top:14px">All medications in this house are already assigned to a pack.</p>';
    var body =
      '<p class="muted" style="margin-top:0">' + meds.length + " medication" + (meds.length === 1 ? "" : "s") + " linked to this pack. Each keeps its own script, expiry, repeats and dosage — this view just rolls up their alerts." + "</p>" +
      (meds.length ? medRows : '<p class="muted">No medications linked yet.</p>') +
      assignRow +
      '<div class="section-divider"></div>' +
      '<button class="btn btn-ghost" data-action="delete-webster-pack" data-id="' + pack.id + '">' + (state.pendingDelete === pack.id ? "Confirm delete pack" : "Delete this Webster Pack") + "</button>";
    return modalWrap(pack.name, body);
  }

  function renderOrdersModal() {
    var h = houseData();
    var typeFilter = state.modal.orderType || "all";
    var title = typeFilter === "consumable" ? "Consumable orders" : typeFilter === "equipment" ? "Equipment orders" : "Orders";
    var orders = h.orders.filter(function (o) { return typeFilter === "all" || o.itemType === typeFilter; });
    var pending = orders.filter(function (o) { return o.status === "pending"; })
      .slice().sort(function (a, b) { return (a.expectedDeliveryDate || "").localeCompare(b.expectedDeliveryDate || ""); });
    var past = orders.filter(function (o) { return o.status !== "pending"; })
      .slice().sort(function (a, b) { return (b.arrivedAt || b.orderedAt || "").localeCompare(a.arrivedAt || a.orderedAt || ""); }).slice(0, 15);

    if (state.modal.adding) {
      var formType = state.modal.formItemType || "consumable";
      var formLinkMode = state.modal.formLinkMode || "existing";
      var existingItems = formType === "consumable" ? h.consumables : h.equipment;
      var existingItemOptions = existingItems.slice().sort(function (a, b) { return a.name.localeCompare(b.name); }).map(function (it) {
        return '<option value="' + it.id + '">' + esc(it.name) + (it.variant ? " — " + esc(it.variant) : "") + " (" + esc(it.client) + ")</option>";
      }).join("");

      var linkFields = "";
      if (formLinkMode === "existing") {
        linkFields = existingItems.length
          ? '<label class="field"><span>Which ' + (formType === "consumable" ? "consumable" : "equipment item") + ' *</span><select name="existingItemId"><option value="">Select item</option>' + existingItemOptions + "</select></label>"
          : '<p class="muted">No ' + (formType === "consumable" ? "consumables" : "equipment") + ' recorded in this house yet — choose "New item" instead.</p>';
      } else {
        linkFields =
          '<label class="field"><span>Item name *</span><input name="newItemLabel" placeholder="' + (formType === "consumable" ? "e.g. Overnight pads" : "e.g. Hoist sling") + '" /></label>' +
          '<label class="field"><span>Client *</span><select name="newItemClient"><option value="">Select client</option>' + clientOptions() + "</select></label>" +
          (formType === "consumable"
            ? '<label class="field"><span>Category</span><select name="newItemCategory">' + consumableCategoryOptions("Pads") + "</select></label>" +
              '<label class="field"><span>Unit</span><select name="newItemUnit">' + consumableUnitOptions("pack") + "</select></label>"
            : '<label class="field"><span>NDIS reference</span><input name="newItemNdisRef" /></label>');
      }

      var body =
        modalError() +
        '<div id="addOrderForm" class="stack">' +
        '<div class="form-grid">' +
        '<label class="field"><span>Item type *</span><select name="itemType" data-input="orderFormItemType">' +
        '<option value="consumable"' + (formType === "consumable" ? " selected" : "") + ">Consumable</option>" +
        '<option value="equipment"' + (formType === "equipment" ? " selected" : "") + ">Equipment</option>" +
        "</select></label>" +
        '<label class="field"><span>Item source *</span><select name="linkMode" data-input="orderFormLinkMode">' +
        '<option value="existing"' + (formLinkMode === "existing" ? " selected" : "") + ">Already have this item — reorder / restock</option>" +
        '<option value="new"' + (formLinkMode === "new" ? " selected" : "") + ">New item, not yet in the system</option>" +
        "</select></label>" +
        "</div>" +
        '<div class="form-grid">' + linkFields + "</div>" +
        '<div class="form-grid">' +
        '<label class="field"><span>Quantity ordered' + (formType === "consumable" ? " *" : "") + '</span><input name="quantity" type="number" min="0" step="any" /></label>' +
        '<label class="field"><span>Expected delivery date</span><input name="expectedDeliveryDate" type="date" /></label>' +
        '<label class="field"><span>Ordered by</span><input name="orderedBy" value="' + esc(state.user.displayName || "") + '" /></label>' +
        "</div>" +
        '<p class="muted" style="margin:0">When marked arrived: reorders add straight to that item\'s stock; new items are created automatically in the ' + (formType === "consumable" ? "Consumables" : "Equipment") + " list." + "</p>" +
        '<label class="field"><span>Notes (optional)</span><textarea name="notes" rows="2" placeholder="Supplier, reference number, anything worth flagging"></textarea></label>' +
        '<button type="button" class="btn btn-primary btn-block" data-action="submit-new-order">Save order</button>' +
        '<button type="button" class="btn btn-ghost btn-block" data-action="cancel-new-order">Cancel</button>' +
        "</div>";
      return modalWrap(title, body);
    }

    function orderRow(o, isPending) {
      return '<div class="row-card">' +
        '<div style="flex:1"><div class="row-title">' + esc(o.itemLabel) + (o.quantity ? " × " + o.quantity : "") + '</div><div class="row-sub">' +
        (o.itemType === "consumable" ? "Consumable" : "Equipment") +
        (o.expectedDeliveryDate ? " · Expected " + fmtDate(o.expectedDeliveryDate) : "") +
        (o.orderedBy ? " · Ordered by " + esc(o.orderedBy) : "") +
        (o.notes ? " · " + esc(o.notes) : "") +
        (isPending ? " · Mark this arrived from Log Delivery (Consumables) or Add Equipment, and link this order there" : "") +
        (!isPending ? " · " + (o.status === "arrived" ? "Arrived " + fmtDate((o.arrivedAt || "").slice(0, 10)) : "Cancelled") : "") +
        "</div></div>" +
        (isPending ?
          '<div style="display:flex;gap:8px">' +
          '<button class="btn btn-ghost btn-sm" data-action="cancel-order" data-id="' + o.id + '">' + (state.pendingDelete === o.id ? "Confirm cancel" : "Cancel") + "</button>" +
          "</div>" : "") +
        "</div>";
    }

    var body =
      '<p class="muted" style="margin-top:0">Orders track consumables and equipment that have been requested from a supplier, so it\'s clear what\'s expected and when — separate from medication repeats, which are tracked on each medication directly. To close out an order, log the delivery (Consumables) or add the equipment, and link the matching order there — stock and order status update together.</p>' +
      '<button class="btn btn-primary btn-block" data-action="new-order-form" style="margin-bottom:14px">' + icon("plus") + " New order</button>" +
      '<h2 class="section-title">Pending (' + pending.length + ")</h2>" +
      (pending.length ? pending.map(function (o) { return orderRow(o, true); }).join("") : '<p class="muted">No pending orders.</p>') +
      '<div class="section-divider"></div>' +
      '<h2 class="section-title">Recent history</h2>' +
      (past.length ? past.map(function (o) { return orderRow(o, false); }).join("") : '<p class="muted">No past orders yet.</p>');
    return modalWrap(title, body);
  }

  /* ---------- clients ---------- */

  function renderClients() {
    var h = houseData();
    var list = h.clients.slice().sort(function (a, b) { return a.name.localeCompare(b.name); });
    var rows = list.map(function (c) {
      var medCount = h.meds.filter(function (m) { return m.client === c.name; }).length;
      var conCount = h.consumables.filter(function (x) { return x.client === c.name; }).length;
      var eqCount = h.equipment.filter(function (x) { return x.client === c.name; }).length;
      return '<div class="row-card client-row">' +
        '<div style="cursor:pointer" data-action="open-client-detail" data-id="' + c.id + '"><div class="row-title">' + esc(c.name) + '</div><div class="row-sub">' + medCount + " medication" + (medCount === 1 ? "" : "s") + ", " + conCount + " consumable" + (conCount === 1 ? "" : "s") + ", " + eqCount + " equipment item" + (eqCount === 1 ? "" : "s") + "</div></div>" +
        '<div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" data-action="open-client-detail" data-id="' + c.id + '">View</button>' +
        '<button class="btn btn-ghost btn-sm" data-action="delete-client" data-id="' + c.id + '">' + (state.pendingDelete === c.id ? "Confirm remove" : "Remove") + "</button></div>" +
        "</div>";
    }).join("");
    var empty = !list.length ? (
      '<div class="empty-block"><p>No clients added yet for ' + esc(houseLabel(state.houseId)) + ".</p>" +
      '<button class="btn btn-secondary btn-sm" data-action="load-sample">Load sample data</button></div>'
    ) : "";

    return (
      '<div class="page-head-row"><h1 class="page-title">Clients</h1>' +
      '<button class="btn btn-primary" data-action="open-modal" data-modal="addClient">' + icon("plus") + " Add client</button></div>" +
      '<p class="page-sub">Clients added here appear when adding or editing medications for ' + esc(houseLabel(state.houseId)) + ". Removing a client here does not change medications already recorded for them.</p>" +
      '<div class="row-list">' + rows + empty + "</div>"
    );
  }

  function renderClientDetailModal() {
    var h = houseData();

  /* ---------- CSV export ---------- */

  function downloadCSV(filename, rows) {
    var csv = rows.map(function (row) {
      return row.map(function (cell) {
        var v = cell === null || cell === undefined ? "" : String(cell);
        if (v.indexOf(",") !== -1 || v.indexOf('"') !== -1 || v.indexOf("\n") !== -1) {
          v = '"' + v.replace(/"/g, '""') + '"';
        }
        return v;
      }).join(",");
    }).join("\r\n");
    var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  function doSubmitExportMeds() {
    var v = getFormValues("exportMedsForm");
    var selected = MED_EXPORT_FIELDS.filter(function (f) { return v["field_" + f.key]; });
    if (!selected.length) {
      state.modalError = "Please select at least one column to export.";
      render();
      return;
    }
    var h = houseData();
    var fieldValue = function (m, key) {
      switch (key) {
        case "name": return m.name;
        case "client": return m.client;
        case "type": return m.type;
        case "route": return m.route || "";
        case "status": return statusLabel(medStatus(m));
        case "stock": return currentMedStock(m) + " " + m.unit;
        case "daysLeft": var dl = medDaysLeft(m); return dl === null ? "" : Math.max(dl, 0);
        case "expiryDate": return m.expiryDate ? fmtDate(m.expiryDate) : "";
        case "ceaseDate": return m.ceaseDate ? fmtDate(m.ceaseDate) : "";
        case "reorderLeadDays": return m.reorderLeadDays || "";
        case "unitsPerDose": return m.unitsPerDose || "";
        case "recurring": return m.recurringEnabled ? (Number(m.recurringQty) + " " + m.unit + " every " + Number(m.recurringIntervalDays) + " day(s), next due " + fmtDate(m.recurringNextDue)) : "";
        case "dosageInstructions": return m.dosageInstructions || "";
        case "prnInstructions": return m.prnInstructions || "";
        case "notes": return m.notes || "";
        default: return "";
      }
    };
    var rows = [selected.map(function (f) { return f.label; })];
    h.meds.forEach(function (m) {
      rows.push(selected.map(function (f) { return fieldValue(m, f.key); }));
    });
    downloadCSV("medications-house-" + state.houseId + ".csv", rows);
    state.modal = null;
    state.modalError = "";
    render();
  }

  /* ---------- audit ---------- */

  function filteredAudit() {
    var h = houseData();
    var q = state.auditSearch.trim().toLowerCase();
    return h.audit.filter(function (a) {
      if (state.auditTypeFilter !== "all" && a.actionType !== state.auditTypeFilter) return false;
      if (!q) return true;
      return (a.details + " " + a.user + " " + a.actionType).toLowerCase().indexOf(q) !== -1;
    });
  }

  function exportAuditCSV() {
    var list = filteredAudit();
    var rows = [["Timestamp", "User", "Action type", "Details"]];
    list.forEach(function (a) {
      rows.push([fmtDateTime(a.timestamp), a.user, a.actionType, a.details]);
    });
    downloadCSV("audit-log-house-" + state.houseId + ".csv", rows);
  }

  function renderAudit() {
    var h = houseData();
    var list = filteredAudit();
    var types = Array.from(new Set(h.audit.map(function (a) { return a.actionType; })));

    var rows = list.map(function (a) {
      return '<div class="audit-row">' +
        '<div class="audit-time">' + fmtDateTime(a.timestamp) + "</div>" +
        '<div class="audit-badge badge-' + actionColor(a.actionType) + '">' + esc(a.actionType) + "</div>" +
        '<div class="audit-detail"><strong>' + esc(a.user) + ":</strong> " + esc(a.details) + "</div>" +
        "</div>";
    }).join("");

    var empty = !list.length ? '<div class="empty-block"><p>No audit history yet — actions taken in this house will appear here.</p></div>' : "";

    var typeOptions = '<option value="all">All actions</option>' + types.map(function (t) {
      return '<option value="' + esc(t) + '"' + (state.auditTypeFilter === t ? " selected" : "") + ">" + esc(t) + "</option>";
    }).join("");

    return (
      '<div class="page-head-row"><h1 class="page-title">Audit log</h1>' +
      '<button class="btn btn-ghost" data-action="export-audit">' + icon("clipboard") + " Export CSV</button></div>" +
      '<div class="filter-row">' +

  function medOptions(selectedId) {

  function getFormValues(containerId) {
    var container = document.getElementById(containerId);

    container.querySelectorAll("[name]").forEach(function (el) {

        '<div><span class="detail-label">Variance</span><div>~' + d.varianceDoses + " dose equivalent</div></div>" +
        '<div><span class="detail-label">Severity</span><div>' + pill(d.tier === "large" ? "red" : "yellow", d.tier === "large" ? "Urgent" : "Moderate") + "</div></div>" +
        "</div>" +
        '<div id="resolveDiscrepancyForm" class="stack">' +
        '<label class="field"><span>Reason *</span><select name="reason">' + discrepancyReasonOptions(d.suggestedReason || "") + "</select></label>" +
        '<label class="field"><span>Notes (optional)</span><textarea name="reasonNote" rows="2" placeholder="Any further detail for the record"></textarea></label>' +

        "</div>";
      return modalWrap("Resolve discrepancy", body);
    }

    var open = h.discrepancies.filter(function (x) { return x.status === "open"; }).sort(function (a, b) { return a.tier === b.tier ? 0 : a.tier === "large" ? -1 : 1; });
    var resolved = h.discrepancies.filter(function (x) { return x.status === "resolved"; }).slice().reverse().slice(0, 10);

    var openHtml = open.length ? open.map(function (d) {
      return '<div class="row-card">' +
        '<div><div class="row-title">' + esc(d.medName) + '</div><div class="row-sub">' + esc(d.client) + " · " + fmtDate(d.date) + (d.suggestedReason ? ' · <span style="color:var(--blue)">Likely: ' + esc(d.suggestedReason) + "</span>" : "") + "</div></div>" +
        '<div class="row-mid">' + pill(d.tier === "large" ? "red" : "yellow", d.tier === "large" ? "Urgent" : "Moderate") + "</div>" +
        '<div class="row-mid">Expected ' + d.expectedStock + ", counted " + d.actualStock + "</div>" +
        '<button class="btn btn-secondary btn-sm" data-action="open-resolve-discrepancy" data-id="' + d.id + '">Resolve</button>' +
        "</div>";
    }).join("") : '<div class="empty-inline">No open discrepancies for ' + esc(houseLabel(state.houseId)) + ".</div>";

    var resolvedHtml = resolved.length ? resolved.map(function (d) {
      return '<div class="mini-row">' + fmtDate(d.date) + " — " + esc(d.medName) + " (" + esc(d.client) + "): " + esc(d.reason) + (d.reasonNote ? " — " + esc(d.reasonNote) : "") + " · resolved by " + esc(d.resolvedBy) + "</div>";

    var body =
      '<div class="page-head-row" style="margin-bottom:14px"><span class="muted" style="font-size:13px">' + (open.length ? open.length + " open, " : "") + h.discrepancies.length + " total on record</span>" +

      '<div class="detail-section"><span class="detail-label">Recently resolved</span>' + resolvedHtml + "</div>";
    return modalWrap("Stock discrepancies — " + houseLabel(state.houseId), body);

  function addDaysISO(n) {
    var d = new Date();
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function addDaysToDateISO(dateStr, n) {
    var parts = dateStr.split("-");
    var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    d.setDate(d.getDate() + n);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  /* ---------- event handling ---------- */

  function applyAlertTarget(targetType, targetId, alertTab) {
    state.modalError = "";
    if (targetType === "med" && targetId) {
      state.modal = { type: "medDetail", id: targetId, editing: false };
    } else if (targetType === "consumable" && targetId) {
      state.modal = { type: "consumableDetail", id: targetId, editing: false };
    } else if (targetType === "equipment" && targetId) {
      state.modal = { type: "equipmentDetail", id: targetId, editing: false };
    } else if (targetType === "discrepancy" && targetId) {
      state.modal = { type: "discrepancies", resolvingId: targetId };
    } else if (targetType === "recurring" && targetId) {
      state.modal = { type: "confirmRecurring", medId: targetId };
    } else if (targetType === "client" && targetId) {
      state.modal = { type: "clientDetail", clientId: targetId };
    } else if (targetType === "pack" && targetId) {
      state.modal = { type: "packDetail", packId: targetId };
    } else if (targetType === "auditType" && targetId) {
      state.tab = alertTab;
      state.auditTypeFilter = targetId;
      state.modal = null;
    } else {
      state.modal = null;
    }
  }

  function handleClick(e) {
    var overlay = e.target.closest && e.target.closest(".modal-overlay");
    var stopEl = e.target.closest && e.target.closest("[data-stop]");
    if (overlay && !stopEl) {
      state.modal = null;
      state.pendingDelete = null;
      state.pendingRepeatAttachment = null;
      state.opsActionNoteAlert = null;
      render();
      return;
    }
    var el = e.target.closest && e.target.closest("[data-action]");
    if (!el) return;
    var action = el.getAttribute("data-action");

    if (action !== "delete-med" && action !== "delete-repeat" && action !== "delete-client" && action !== "delete-consumable" && action !== "delete-equipment") {
      state.pendingDelete = null;
    }

    switch (action) {
      case "logout":
        clearSession();
        state.user = null;
        state.houseId = null;
        state.tab = "dashboard";
        state.modal = null;
        state.viewingOpsOverview = false;
        state.viewingAllHouses = false;
        state.sinceLastLogin = null;
        state.loaded = false;
        state.data = {};
        render();
        break;
      case "select-house":
        state.houseId = Number(el.getAttribute("data-house"));
        state.tab = "dashboard";
        state.viewingAllHouses = false;
        state.viewingOpsOverview = false;
        addAudit(state.houseId, "House accessed", (state.user.displayName || state.user.email) + " (" + state.user.role + ") opened this house's records.");
        render();
        saveHouse(state.houseId);
        break;
      case "switch-house":
        state.houseId = null;
        state.viewingAllHouses = false;
        state.viewingOpsOverview = false;
        render();
        break;
      case "view-all-houses":
        state.viewingAllHouses = true;
        state.viewingOpsOverview = false;
        render();
        break;
      case "back-to-house-select":
        state.viewingAllHouses = false;
        state.viewingOpsOverview = false;
        render();
        break;
      case "browse-houses":
        state.viewingOpsOverview = false;
        state.houseId = null;
        render();
        break;
      case "back-to-ops-overview":
        state.viewingOpsOverview = true;
        state.houseId = null;
        render();
        break;
      case "assign-alert-me":
        doAssignAlertToMe(el);
        break;
      case "open-action-note":
        state.opsActionNoteAlert = {
          house: Number(el.getAttribute("data-house")),
          id: el.getAttribute("data-alert-id"),
          level: el.getAttribute("data-level"),
          action: el.getAttribute("data-alert-action"),
          text: el.getAttribute("data-text"),
          tab: el.getAttribute("data-tab"),
          targetType: el.getAttribute("data-target-type"),
          targetId: el.getAttribute("data-target-id")
        };
        state.modal = { type: "actionNote" };
        state.modalError = "";
        render();
        break;
      case "submit-action-note":
        doSubmitActionNote();
        break;
      case "resolve-alert":
        doResolveAlert(Number(el.getAttribute("data-house")), el.getAttribute("data-alert-id"));
        break;
      case "review-alert":
        var reviewHouse = Number(el.getAttribute("data-house"));
        if (state.user.houses.indexOf(reviewHouse) === -1) break;
        state.houseId = reviewHouse;
        applyAlertTarget(el.getAttribute("data-target-type"), el.getAttribute("data-target-id"), el.getAttribute("data-tab"));
        render();
        break;
      case "open-rename-house":
        state.modal = { type: "renameHouse", houseId: Number(el.getAttribute("data-house")) };
        state.modalError = "";
        render();
        break;
      case "set-tab":
        var targetTab = el.getAttribute("data-tab");
        if (allowedTabs().indexOf(targetTab) === -1) break;
        state.tab = targetTab;
        state.modal = null;
        render();
        break;
      case "dashboard-filter":
        if (allowedTabs().indexOf("medications") === -1) break;
        state.medFilter = el.getAttribute("data-status");
        state.tab = "medications";
        render();
        break;
      case "open-alert":
        var alertTab = el.getAttribute("data-tab");
        if (allowedTabs().indexOf(alertTab) === -1) break;
        applyAlertTarget(el.getAttribute("data-target-type"), el.getAttribute("data-target-id"), alertTab);
        render();
        break;
      case "open-alert-house":
        var targetHouse = Number(el.getAttribute("data-house"));
        if (state.user.houses.indexOf(targetHouse) === -1) break;
        state.houseId = targetHouse;
        state.viewingAllHouses = false;
        state.tab = "dashboard";
        applyAlertTarget(el.getAttribute("data-target-type"), el.getAttribute("data-target-id"), el.getAttribute("data-tab"));
        render();
        break;
      case "go-to-search-result":
        var searchHouse = Number(el.getAttribute("data-house"));
        if (state.user.houses.indexOf(searchHouse) === -1) break;
        state.houseId = searchHouse;
        state.viewingAllHouses = false;
        state.viewingOpsOverview = false;
        state.tab = "dashboard";
        state.globalSearch = "";
        applyAlertTarget(el.getAttribute("data-type"), el.getAttribute("data-id"), "dashboard");
        render();
        break;
      case "open-modal":
        var reqModal = el.getAttribute("data-modal");
        var restrictedForSupport = ["addMed", "addClient", "addRepeat", "flagIncident", "addConsumable", "addEquipment", "discrepancies", "disposeStock", "exportMeds", "clientDetail"];
        if (isSupportWorker() && restrictedForSupport.indexOf(reqModal) !== -1) break;
        var restrictedForClinical = ["addConsumable", "addEquipment", "consumableStockCheck", "addConsumableDelivery"];
        if (isClinical() && restrictedForClinical.indexOf(reqModal) !== -1) break;
        state.modal = { type: reqModal };
        state.modalError = "";
        state.pendingRepeatAttachment = null;
        render();
        break;
      case "close-modal":
        state.modal = null;
        state.modalError = "";
        state.pendingRepeatAttachment = null;
        state.opsActionNoteAlert = null;
        render();
        break;
      case "open-med-detail":
        if (isSupportWorker()) break;
        state.modal = { type: "medDetail", id: el.getAttribute("data-id"), editing: false };
        state.modalError = "";
        render();
        break;
      case "open-pack-detail":
        if (isSupportWorker()) break;
        state.modal = { type: "packDetail", packId: el.getAttribute("data-id") };
        state.modalError = "";
        render();
        break;
      case "new-webster-pack":
        if (isSupportWorker()) break;
        var newPackName = (window.prompt("Name this Webster Pack (e.g. \"Webster Pack A\"):") || "").trim();
        if (!newPackName) break;
        mutate(function () {
          var h = houseData();
          var pack = { id: uid("pack"), name: newPackName, createdAt: new Date().toISOString() };
          h.websterPacks.push(pack);
          addAudit(state.houseId, "Webster Pack created", newPackName + " created.");
        });
        break;
      case "assign-pack-med":
        if (isSupportWorker()) break;
        var assignSelectEl = document.getElementById("packAssignSelect");
        var assignMedId = assignSelectEl ? assignSelectEl.value : "";
        var assignPackId = el.getAttribute("data-pack-id");
        if (!assignMedId) break;
        mutate(function () {
          var h = houseData();
          var m = h.meds.find(function (mm) { return mm.id === assignMedId; });
          var p = h.websterPacks.find(function (pp) { return pp.id === assignPackId; });
          if (!m || !p) return;
          m.websterPackId = assignPackId;
          addAudit(state.houseId, "Medication assigned to Webster Pack", m.name + " added to " + p.name + ".");
        });
        render();
        break;
      case "unassign-pack-med":
        if (isSupportWorker()) break;
        var unassignMedId = el.getAttribute("data-id");
        mutate(function () {
          var h = houseData();
          var m = h.meds.find(function (mm) { return mm.id === unassignMedId; });
          if (!m) return;
          m.websterPackId = "";
          addAudit(state.houseId, "Medication removed from Webster Pack", m.name + " unlinked from its Webster Pack.");
        });
        render();
        break;
      case "open-orders":
        state.modal = { type: "orders", orderType: el.getAttribute("data-order-type") || "all", adding: false };
        state.modalError = "";
        render();
        break;
      case "new-order-form":
        if (isSupportWorker()) break;
        state.modal.adding = true;
        state.modal.formItemType = state.modal.orderType === "equipment" ? "equipment" : "consumable";
        state.modal.formLinkMode = "existing";
        state.modalError = "";
        render();
        break;
      case "cancel-new-order":
        state.modal.adding = false;

  function handleInput(e) {
    var t = e.target;
    var key = t.getAttribute && t.getAttribute("data-input");
    if (!key) return;
    if (key === "medSearch") { state.medSearch = t.value; preserveFocusRerender(); }
    else if (key === "globalSearch") { state.globalSearch = t.value; preserveFocusRerender(); }
    else if (key === "deliverySearch") { state.deliverySearch = t.value; preserveFocusRerender(); }
    else if (key === "auditSearch") { state.auditSearch = t.value; preserveFocusRerender(); }
    else if (key === "consumableSearch") { state.consumableSearch = t.value; preserveFocusRerender(); }
    else if (key === "consumableDeliverySearch") { state.consumableDeliverySearch = t.value; preserveFocusRerender(); }
    else if (key === "equipmentSearch") { state.equipmentSearch = t.value; preserveFocusRerender(); }
    else if (key === "medFilter") { state.medFilter = t.value; render(); }
    else if (key === "auditTypeFilter") { state.auditTypeFilter = t.value; render(); }
    else if (key === "consumableFilter") { state.consumableFilter = t.value; render(); }
    else if (key === "equipmentFilter") { state.equipmentFilter = t.value; render(); }
    else if (key === "cosClientKey") { state.cosClientKey = t.value; render(); }
    else if (key === "allHousesSort") { state.allHousesSort = t.value; render(); }
    else if (key === "orderFormItemType") { state.modal.formItemType = t.value; render(); }
    else if (key === "orderFormLinkMode") { state.modal.formLinkMode = t.value; render(); }
    else if (key === "deliveryLinkedOrder") { state.modal.linkedOrderId = t.value; render(); }
    else if (key === "repeatAttachment") {
      var file = t.files && t.files[0];
      if (!file) { state.pendingRepeatAttachment = null; return; }
      if (file.size > 300 * 1024) {
        state.modalError = "That file is too large for this demo (limit ~300KB). Please choose a smaller file.";
        t.value = "";
        render();
        return;
      }
      var reader = new FileReader();
      reader.onload = function () {
        state.pendingRepeatAttachment = { name: file.name, dataUrl: reader.result };
        state.modalError = "";
        render();
      };
      reader.readAsDataURL(file);
    } else if (key && key.indexOf("nochange_") === 0) {
      var targetId = t.getAttribute("data-target");
      var currentVal = t.getAttribute("data-current");
      var targetEl = targetId ? document.getElementById(targetId) : null;
      if (targetEl) {
        if (t.checked) {
          targetEl.value = currentVal;
          targetEl.disabled = true;
        } else {
          targetEl.disabled = false;
        }
      }
    }
  }

  async function doSubmitLogin() {
    var v = getFormValues("loginForm");
    var email = (v.username || "").trim();
    var pass = (v.password || "").trim();
    if (!email || !pass) {
      state.loginError = "Please enter your email and password.";
      render();
      return;
    }
    state.loggingIn = true;
    state.loginError = "";
    render();
    try {
      var auth = await supabaseAuthLogin(email, pass);
      if (!auth.ok) {
        state.loginError = "Incorrect email or password.";
        state.loggingIn = false;
        render();
        return;
      }
      var user = await buildUserFromAuth(auth.authUser, auth.accessToken, auth.refreshToken);
      if (!user) {
        state.loginError = "This account doesn't have an access profile set up yet. Contact an admin.";
        state.loggingIn = false;
        render();
        return;
      }
      state.user = user;
      state.loggingIn = false;
      saveSession(user);
      state.loaded = false;
      render();
      await loadData();
      if (user.role === "Admin" || user.role === "Clinical") {
        state.viewingOpsOverview = true;
        loadLoginActivity(user.email);
      }
      render();
    } catch (e) {
      state.loginError = "Couldn't reach the login server (" + (e && e.message ? e.message : String(e)) + "). Check your connection and try again.";
      state.loggingIn = false;
      render();
    }
  }

  async function loadLoginActivity(username) {
    if (state.storageDisabled) { state.sinceLastLogin = null; render(); return; }
    var key = "nextrace-activity-v1";
    var store = {};
    try {
      var res = await storageAdapter.get(key);
      store = res && res.value ? JSON.parse(res.value) : {};
    } catch (e) {
      store = {};
    }
    state.sinceLastLogin = (store[username] && store[username].lastLogin) || null;
    store[username] = { lastLogin: new Date().toISOString() };
    try {
      await storageAdapter.set(key, JSON.stringify(store));
    } catch (e) {
      console.error("NexTrace: failed to save login activity", e);
      saveFailCount++;
      if (saveFailCount >= 3) state.storageDisabled = true;
    }
    render();
  }

  function applyMedDelivery(h, med, qty, deliveryDate, expiry) {
    var delivery = {
      id: uid("del"),
      medId: med.id,
      medName: med.name,
      client: med.client,
      quantity: qty,
      unit: med.unit,
      expiryDate: expiry || med.expiryDate,
      deliveryDate: deliveryDate || todayISO(),
      house: state.houseId,
      createdAt: new Date().toISOString()
    };
    med.stock = currentMedStock(med) + qty;
    med.stockAsOfDate = deliveryDate || todayISO();
    if (expiry) med.expiryDate = expiry;
    h.deliveries.push(delivery);
    addAudit(state.houseId, "Delivery received", "+" + qty + " " + med.unit + " of " + med.name + " (" + med.client + ") received.");

    var eligibleRepeats = h.repeats.filter(function (r) {
      return r.medId === med.id && Number(r.repeatsRemaining) > 0 && repeatStatus(r) !== "Expired";
    }).sort(function (a, b) { return (a.repeatExpiryDate || "").localeCompare(b.repeatExpiryDate || ""); });
    if (eligibleRepeats.length) {
      var rep = eligibleRepeats[0];
      rep.repeatsRemaining = Number(rep.repeatsRemaining) - 1;
      addAudit(state.houseId, "Repeat updated", "1 repeat used for " + med.name + " (" + med.client + ") following this delivery — " + rep.repeatsRemaining + " repeat(s) now remaining.");
    }

  function doSubmitStockCheck() {
    var v = getFormValues("stockCheckForm");
    var h = houseData();
    var notes = (v.stockCheckNotes || "").trim();
    var today = todayISO();
    var totalChecked = 0;
    var adjusted = [];
    var flaggedModerate = [];
    var flaggedLarge = [];
    mutate(function () {
      h.meds.forEach(function (med) {
        var raw = v["count_" + med.id];
        if (raw === undefined || raw === "") return;
        var counted = Number(raw);
        if (isNaN(counted)) return;
        totalChecked++;

        var log = med.stockCheckLog || (med.stockCheckLog = []);

        // Expected stock is exactly the live auto-countdown figure, evaluated right now,
        // before the count below resets the baseline.
        var expectedStock = currentMedStock(med);
        var variance = counted - expectedStock;
        var varianceAbs = Math.abs(variance);
        var unitsPerDose = Number(med.unitsPerDose) > 0 ? Number(med.unitsPerDose) : 1;
        var varianceDoses = Math.round((varianceAbs / unitsPerDose) * 10) / 10;

        var tier = varianceDoses <= 2 ? "minor" : varianceDoses <= 5 ? "moderate" : "large";

        // Known-change hint: don't auto-resolve, but suggest the likely reason so staff
        // aren't guessing — expiry/cease still require an explicit human confirmation.
        var wasCeasedThisPeriod = med.ceaseDate && daysBetween(med.ceaseDate) <= 0;
        var wasExpiredAlready = med.expiryDate && daysBetween(med.expiryDate) < 0;
        var suggestedReason = "";
        var suggestedNote = "";
        if (wasCeasedThisPeriod) {
          suggestedReason = "Ceased";
          suggestedNote = "This medication was ceased on " + fmtDate(med.ceaseDate) + " — likely explains some or all of this variance.";
        } else if (wasExpiredAlready) {
          suggestedReason = "Expired";
          suggestedNote = "This medication expired on " + fmtDate(med.expiryDate) + " — check whether stock was disposed of.";
        }

        var priorLoggedStock = expectedStock;
        med.stock = counted;
        med.stockAsOfDate = today;
        if (varianceDoses > 0) adjusted.push(med.name);

        log.push({
          id: uid("mstk"),
          date: today,
          counted: counted,
          expected: Math.round(expectedStock * 10) / 10,
          varianceDoses: varianceDoses,
          tier: tier,
          note: notes
        });

        if (tier === "minor") {
          if (varianceDoses > 0) {
            addAudit(state.houseId, "Stock check adjustment", med.name + " (" + med.client + "): system showed " + priorLoggedStock + " " + med.unit + ", counted " + counted + " " + med.unit + " — within normal variance (~" + varianceDoses + " dose equivalent), likely admin error or minor loss." + (notes ? " Note: " + notes : ""));
          }
        } else {
          var disc = {
            id: uid("disc"),
            medId: med.id,
            medName: med.name,
            client: med.client,
            house: state.houseId,
            date: today,
            expectedStock: Math.round(expectedStock * 10) / 10,
            actualStock: counted,
            varianceDoses: varianceDoses,
            tier: tier,
            status: "open",
            reason: "",
            reasonNote: "",
            suggestedReason: suggestedReason,
            suggestedNote: suggestedNote,
            resolvedBy: "",
            resolvedAt: "",
            createdAt: new Date().toISOString()
          };
          h.discrepancies.push(disc);
          if (tier === "moderate") {
            flaggedModerate.push(med.name);
            addAudit(state.houseId, "Discrepancy detected", med.name + " (" + med.client + ") — expected ~" + disc.expectedStock + " " + med.unit + ", counted " + counted + " " + med.unit + " (~" + varianceDoses + " dose equivalent). Possible missed documentation or loss — review required." + (suggestedNote ? " " + suggestedNote : "") + (notes ? " Note: " + notes : ""));
          } else {
            flaggedLarge.push(med.name);
            addAudit(state.houseId, "Discrepancy detected", "URGENT — " + med.name + " (" + med.client + ") expected ~" + disc.expectedStock + " " + med.unit + ", counted " + counted + " " + med.unit + " (~" + varianceDoses + " dose equivalent). Requires immediate review." + (suggestedNote ? " " + suggestedNote : "") + (notes ? " Note: " + notes : ""));
          }
        }
      });
      var summary = totalChecked + " medication(s) checked in " + houseLabel(state.houseId) + ".";
      if (adjusted.length) summary += " " + adjusted.length + " stock figure(s) updated.";
      if (flaggedModerate.length) summary += " " + flaggedModerate.length + " flagged for review: " + flaggedModerate.join(", ") + ".";
      if (flaggedLarge.length) summary += " " + flaggedLarge.length + " flagged urgent: " + flaggedLarge.join(", ") + ".";
      if (!flaggedModerate.length && !flaggedLarge.length) summary += " No discrepancies requiring review.";
      addAudit(state.houseId, "Stock check completed", summary);
    });
    state.modal = null;
    state.modalError = "";
    render();
  }

  async function doMoveClient(clientId, targetHouseId) {
    var sourceHouseId = state.houseId;
    var sourceH = state.data[sourceHouseId];
    var targetH = state.data[targetHouseId];
    var client = sourceH.clients.find(function (c) { return c.id === clientId; });
    if (!client || !targetH) return;
    var name = client.name;
    var fromLabel = houseLabel(sourceHouseId);
    var toLabel = houseLabel(targetHouseId);

    // Client record
    sourceH.clients = sourceH.clients.filter(function (c) { return c.id !== clientId; });
    targetH.clients.push(client);

    // Medications (clear Webster Pack link — packs are house-specific)
    var movedMeds = sourceH.meds.filter(function (m) { return m.client === name; });
    sourceH.meds = sourceH.meds.filter(function (m) { return m.client !== name; });
    movedMeds.forEach(function (m) { m.house = targetHouseId; m.websterPackId = ""; });
    targetH.meds = targetH.meds.concat(movedMeds);

    // Medication deliveries and repeats and discrepancies
    ["deliveries", "repeats", "discrepancies"].forEach(function (field) {
      var moved = sourceH[field].filter(function (r) { return r.client === name; });
      sourceH[field] = sourceH[field].filter(function (r) { return r.client !== name; });
      moved.forEach(function (r) { r.house = targetHouseId; });
      targetH[field] = targetH[field].concat(moved);
    });

    // Consumables + their deliveries
    var movedCons = sourceH.consumables.filter(function (c) { return c.client === name; });
    var movedConsIds = movedCons.map(function (c) { return c.id; });
    sourceH.consumables = sourceH.consumables.filter(function (c) { return c.client !== name; });
    targetH.consumables = targetH.consumables.concat(movedCons);
    var movedConsDeliveries = sourceH.consumableDeliveries.filter(function (d) { return movedConsIds.indexOf(d.itemId) !== -1; });
    sourceH.consumableDeliveries = sourceH.consumableDeliveries.filter(function (d) { return movedConsIds.indexOf(d.itemId) === -1; });
    targetH.consumableDeliveries = targetH.consumableDeliveries.concat(movedConsDeliveries);

    // Equipment
    var movedEq = sourceH.equipment.filter(function (e) { return e.client === name; });
    sourceH.equipment = sourceH.equipment.filter(function (e) { return e.client !== name; });
    targetH.equipment = targetH.equipment.concat(movedEq);

    addAudit(sourceHouseId, "Client moved", name + " moved to " + toLabel + " — medications, consumables, equipment and history moved with them.");
    addAudit(targetHouseId, "Client moved", name + " moved in from " + fromLabel + " — medications, consumables, equipment and history moved with them.");

    state.modal = null;
    render();
    await saveHouse(sourceHouseId);
    await saveHouse(targetHouseId);
  }

  function doSubmitConsumableStockCheck() {
    var v = getFormValues("consumableStockCheckForm");
    var h = houseData();
    var notes = (v.stockCheckNotes || "").trim();
    var today = todayISO();
    var checked = 0;
    var flagged = [];
    mutate(function () {
      h.consumables.forEach(function (item) {
        var raw = v["count_" + item.id];
        if (raw === undefined || raw === "") return;
        var counted = Number(raw);
        if (isNaN(counted)) return;
        checked++;

        // Expected is the live auto-decremented figure, evaluated right now before we overwrite it.
        var expectedStock = currentConsumableStock(item);
        var log = item.stocktakeLog || (item.stocktakeLog = []);
        var lastDate = item.stockAsOfDate || item.createdAt.slice(0, 10);
        var daysSince = Math.max(1, Math.round((new Date(today) - new Date(lastDate)) / 86400000));
        var deliveredSinceLast = h.consumableDeliveries.filter(function (d) {
          return d.itemId === item.id && d.deliveryDate > lastDate && d.deliveryDate <= today;
        }).reduce(function (t, d) { return t + Number(d.quantity); }, 0);

        // Observed usage rate from the real physical delta — this becomes the new rolling average
        // driving tomorrow's auto-countdown, regardless of what today's prediction assumed.
        var priorRawStock = Number(item.stock);
        var observedUsedQty = priorRawStock + deliveredSinceLast - counted;
        var observedMonthlyUsage = Math.max(0, (observedUsedQty / daysSince) * 30);

        var priorAvg = consumableAvgMonthlyUsage(item);
        var abnormal = false;
        if (priorAvg > 0) {
          var change = Math.abs(observedMonthlyUsage - priorAvg) / priorAvg;
          if (change > 0.4) abnormal = true;
        }

        log.push({
          id: uid("stk"),
          date: today,
          counted: counted,
          expected: Math.round(expectedStock * 10) / 10,
          deliveredSinceLast: deliveredSinceLast,
          calculatedMonthlyUsage: Math.round(observedMonthlyUsage * 10) / 10,
          note: notes,
          abnormal: abnormal
        });

        item.stock = counted;
        item.stockAsOfDate = today;

        if (abnormal) {
          flagged.push(item.name);
          addAudit(state.houseId, "Consumable usage flagged", item.name + " (" + item.client + ") — expected ~" + expectedStock + " " + item.unit + ", counted " + counted + ". Usage changed to ~" + observedMonthlyUsage.toFixed(1) + " " + item.unit + "/month, versus a usual ~" + priorAvg.toFixed(1) + " — worth checking in." + (notes ? " Note: " + notes : ""));
        }
      });
      addAudit(state.houseId, "Consumable stocktake recorded", checked + " consumable(s) checked in " + houseLabel(state.houseId) + (flagged.length ? ", " + flagged.length + " flagged for unusual usage: " + flagged.join(", ") + "." : ", usage looks consistent with previous averages."));
    });
    state.modal = null;
    state.modalError = "";
    render();
  }

      houseData().equipment.push(eq);
      addAudit(state.houseId, "Equipment added", eq.name + " (" + eq.client + ") added — status: " + eq.status + ".");
      if (v.linkedOrderId) {
        var h = houseData();
        var ord = h.orders.find(function (o) { return o.id === v.linkedOrderId && o.status === "pending"; });
        if (ord) {
          ord.status = "arrived";
          ord.arrivedAt = new Date().toISOString();
          addAudit(state.houseId, "Order arrived", "Order for " + ord.itemLabel + " marked arrived (equipment added).");
        }
      }
    });
    state.modal = null;
    state.modalError = "";
    render();
  }

  function doSubmitEditEquipment() {
    var v = getFormValues("editEquipmentForm");
    if (!v.client || !v.name || !v.name.trim()) {
      state.modalError = "Please select a client and enter the equipment name.";
      render();
      return;
    }
    var eqId = state.modal.id;
    mutate(function () {
      var eq = houseData().equipment.find(function (e) { return e.id === eqId; });
      if (!eq) return;
      var statusChanged = eq.status !== v.status;
      eq.client = v.client;
      eq.name = v.name.trim();
      eq.ndisReference = (v.ndisReference || "").trim();
      eq.status = v.status;
      eq.dateReported = v.dateReported || "";
      eq.expectedCompletionDate = v.expectedCompletionDate || "";
      eq.repairProvider = (v.repairProvider || "").trim();
      eq.faultDescription = (v.faultDescription || "").trim();
      eq.servicingIntervalDays = Number(v.servicingIntervalDays) || 0;
      eq.nextServiceDue = v.nextServiceDue || "";
      eq.inspectionIntervalDays = Number(v.inspectionIntervalDays) || 0;
      eq.nextInspectionDue = v.nextInspectionDue || "";
      if (!eq.history) eq.history = [];
      eq.history.push({ id: uid("eqh"), date: todayISO(), status: v.status, note: statusChanged ? "Status updated" : "Details updated" });
      addAudit(state.houseId, "Equipment status updated", eq.name + " (" + eq.client + ") — now " + eq.status + ".");
    });
    state.modal.editing = false;
    state.modalError = "";
    render();
  }

  function doConfirmServiced(eqId) {
    mutate(function () {
      var eq = houseData().equipment.find(function (e) { return e.id === eqId; });
      if (!eq) return;
      var base = eq.nextServiceDue || todayISO();
      eq.nextServiceDue = addDaysToDateISO(base, Number(eq.servicingIntervalDays) || 365);
      if (!eq.history) eq.history = [];
      eq.history.push({ id: uid("eqh"), date: todayISO(), status: eq.status, note: "Servicing completed — next due " + fmtDate(eq.nextServiceDue) });
      addAudit(state.houseId, "Equipment status updated", eq.name + " (" + eq.client + ") serviced — next service due " + fmtDate(eq.nextServiceDue) + ".");
    });
    render();
  }

  function doConfirmInspected(eqId) {
    mutate(function () {
      var eq = houseData().equipment.find(function (e) { return e.id === eqId; });
      if (!eq) return;
      var base = eq.nextInspectionDue || todayISO();
      eq.nextInspectionDue = addDaysToDateISO(base, Number(eq.inspectionIntervalDays) || 180);
      if (!eq.history) eq.history = [];
      eq.history.push({ id: uid("eqh"), date: todayISO(), status: eq.status, note: "Safety inspection completed — next due " + fmtDate(eq.nextInspectionDue) });
      addAudit(state.houseId, "Equipment status updated", eq.name + " (" + eq.client + ") safety inspection completed — next due " + fmtDate(eq.nextInspectionDue) + ".");
    });
    render();
  }

  function doSubmitResolveDiscrepancy() {
    var v = getFormValues("resolveDiscrepancyForm");
    if (!v.reason) {
      state.modalError = "Please select a reason before confirming.";
      render();
      return;
    }
    var discId = state.modal.resolvingId;
    mutate(function () {
      var h = houseData();
      var d = h.discrepancies.find(function (x) { return x.id === discId; });
      if (!d) return;
      d.status = "resolved";
      d.reason = v.reason;
      d.reasonNote = (v.reasonNote || "").trim();
      d.resolvedBy = state.user.displayName;
      d.resolvedAt = new Date().toISOString();
      addAudit(state.houseId, "Discrepancy resolved", d.medName + " (" + d.client + ") — reason: " + d.reason + (d.reasonNote ? ". Note: " + d.reasonNote : "") + ". Resolved by " + state.user.displayName + ".");
    });
    state.modal.resolvingId = null;
    state.modalError = "";
    render();
  }

  function doSubmitDisposeStock() {
    var v = getFormValues("disposeStockForm");
    if (!v.reason || v.quantity === "" || v.quantity === undefined || Number(v.quantity) <= 0) {
      state.modalError = "Please enter a quantity greater than 0 and select a reason.";
      render();
      return;
    }
    var medId = state.modal.medId;
    mutate(function () {
      var med = houseData().meds.find(function (m) { return m.id === medId; });
      if (!med) return;
      var curStock = currentMedStock(med);
      var qty = Math.min(Number(v.quantity), curStock);
      med.stock = Math.max(0, curStock - qty);
      med.stockAsOfDate = todayISO();
      addAudit(state.houseId, "Medication disposed", qty + " " + med.unit + " of " + med.name + " (" + med.client + ") disposed — reason: " + v.reason + "." + ((v.reasonNote || "").trim() ? " Note: " + v.reasonNote.trim() : ""));
    });
    state.modal = null;
    state.modalError = "";
    render();
  }

  function doSubmitConfirmRecurring() {
    var v = getFormValues("confirmRecurringForm");
    if (!v.quantity || Number(v.quantity) <= 0 || !v.deliveryDate) {
      state.modalError = "Please enter a quantity greater than 0 and a delivery date.";
      render();
      return;
    }
    var medId = state.modal.medId;
    mutate(function () {
      var h = houseData();
      var med = h.meds.find(function (m) { return m.id === medId; });
      if (!med) return;
      applyMedDelivery(h, med, Number(v.quantity) || 0, v.deliveryDate || todayISO(), "");
      var base = med.recurringNextDue || todayISO();
      med.recurringNextDue = addDaysToDateISO(base, Number(med.recurringIntervalDays) || 7);
      addAudit(state.houseId, "Delivery received", "Recurring delivery confirmed for " + med.name + " (" + med.client + ") — next due " + fmtDate(med.recurringNextDue) + ".");
    });
    state.modal = null;
    state.modalError = "";
    render();
  }

  function doSubmitSkipRecurring() {
    var medId = state.modal.medId;
    mutate(function () {
      var med = houseData().meds.find(function (m) { return m.id === medId; });
      if (!med) return;
      var base = med.recurringNextDue || todayISO();
      med.recurringNextDue = addDaysToDateISO(base, Number(med.recurringIntervalDays) || 7);
      addAudit(state.houseId, "Repeat updated", "Recurring delivery for " + med.name + " (" + med.client + ") marked as not delivered this cycle — next due " + fmtDate(med.recurringNextDue) + ".");
    });
    state.modal = null;
    state.modalError = "";
    render();
  }

  function doSubmitRenameHouse() {
    var v = getFormValues("renameHouseForm");
    var name = (v.houseName || "").trim();
    if (!name) {
      state.modalError = "Please enter a house name.";
      render();
      return;
    }
    var houseId = state.modal.houseId;
    var oldName = houseLabel(houseId);
    mutate(function () {
      state.data[houseId].houseName = name;
      addAudit(houseId, "House renamed", "House " + houseId + " renamed from \"" + oldName + "\" to \"" + name + "\".");
    });
    state.modal = null;
    state.modalError = "";
    render();
  }

  SUBMIT_HANDLERS = {
    loginForm: doSubmitLogin,
    addMedForm: doSubmitAddMed,
    editMedForm: doSubmitEditMed,
    addDeliveryForm: doSubmitAddDelivery,
    addRepeatForm: doSubmitAddRepeat,
    flagIncidentForm: doSubmitFlagIncident,
    stockCheckForm: doSubmitStockCheck,
    addClientForm: doSubmitAddClient,
    addConsumableForm: doSubmitAddConsumable,
    editConsumableForm: doSubmitEditConsumable,
    addConsumableDeliveryForm: doSubmitAddConsumableDelivery,
    consumableStockCheckForm: doSubmitConsumableStockCheck,
    addEquipmentForm: doSubmitAddEquipment,
    editEquipmentForm: doSubmitEditEquipment,
    resolveDiscrepancyForm: doSubmitResolveDiscrepancy,
    disposeStockForm: doSubmitDisposeStock,
    confirmRecurringForm: doSubmitConfirmRecurring,
    renameHouseForm: doSubmitRenameHouse,
    actionNoteForm: doSubmitActionNote
  };

  function handleKeydown(e) {
    if (e.key === "Escape") {
      if (state.modal) {
        state.modal = null;
        state.modalError = "";
        state.pendingDelete = null;
        render();
      }
      return;
    }
    if (e.key === "Enter" && e.target.tagName === "INPUT") {
      var container = e.target.closest("[id]");
      while (container && !SUBMIT_HANDLERS[container.id]) {
        container = container.parentElement && container.parentElement.closest("[id]");
      }
      if (container && SUBMIT_HANDLERS[container.id]) {
        e.preventDefault();
        SUBMIT_HANDLERS[container.id]();
        return;
      }
    }
    if ((e.key === "Enter" || e.key === " ") && e.target.getAttribute && e.target.getAttribute("data-action") && e.target.tagName !== "BUTTON" && e.target.tagName !== "A" && e.target.tagName !== "INPUT" && e.target.tagName !== "SELECT" && e.target.tagName !== "TEXTAREA") {
      e.preventDefault();
      e.target.click();
    }
  }

  // Makes every clickable [data-action] element keyboard-focusable and
  // announced correctly to screen readers, without needing to hand-edit
  // every clickable div/row in the markup individually.
  function enhanceA11y(root) {
    if (!root || !root.querySelectorAll) return;
    root.querySelectorAll("[data-action]").forEach(function (el) {
      var tag = el.tagName;
      if (tag === "BUTTON" || tag === "A" || tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return;
      if (!el.hasAttribute("tabindex")) el.setAttribute("tabindex", "0");
      if (!el.hasAttribute("role")) el.setAttribute("role", "button");
    });
  }

  /* ---------- init ---------- */

  async function init() {
    var app = document.getElementById("app");
    app.addEventListener("click", handleClick);
    app.addEventListener("input", handleInput);
    app.addEventListener("change", handleInput);
    app.addEventListener("keydown", handleKeydown);

    var lastModalSeen = null;
    var a11yObserver = new MutationObserver(function () {
      enhanceA11y(document.getElementById("app"));
      var modalRootEl = document.getElementById("modalRoot");
      enhanceA11y(modalRootEl);
      var modalBox = modalRootEl && modalRootEl.querySelector(".modal-box");
      if (modalBox && modalBox !== lastModalSeen) {
        lastModalSeen = modalBox;
        modalBox.focus();
      } else if (!modalBox) {
        lastModalSeen = null;
      }
    });
    a11yObserver.observe(document.body, { childList: true, subtree: true });

    render();

    var saved = loadSessionFromStorage();
    if (saved && saved.accessToken && saved.id) {
      var profile = await fetchProfile(saved.id, saved.accessToken).catch(function () { return null; });
      if (!profile && saved.refreshToken) {
        var r = await supabaseAuthRefresh(saved.refreshToken).catch(function () { return { ok: false }; });
        if (r.ok) {
          saved.accessToken = r.accessToken;
          saved.refreshToken = r.refreshToken;
          profile = await fetchProfile(saved.id, saved.accessToken).catch(function () { return null; });
        }
      }
      if (profile) {
        saved.displayName = profile.display_name;
        saved.role = profile.role;
        saved.houses = (profile.houses || "").split(",").map(function (s) { return Number(s.trim()); }).filter(function (n) { return !isNaN(n); });
        saved.orgId = profile.org_id;
        state.user = saved;
        saveSession(saved);
        state.authChecked = true;
        render();
        await loadData();
        render();
        return;
      }
      clearSession();
    }
    state.authChecked = true;
    render();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();

</script>
</body>
</html>
